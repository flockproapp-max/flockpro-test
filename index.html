      // ─── INVENTORY & EXPENSES ────────────────────────────────────────────────
      // Data model:
      //   inventoryCategories: [{ docId, name, collapsed }]
      //   inventoryItems:      [{ docId, categoryId, name, unit, costPer, qty }]
      //   expenses:            [{ docId, date, categoryName, description, amount }]

      async loadInventory() {
        if (!this.user) return;
        const DEFAULT_CATS = [
          { key: 'fCost',        name: 'Total Feed Cost' },
          { key: 'pCost',        name: 'Poult Cost' },
          { key: 'meds',         name: 'Meds & Vaccines' },
          { key: 'clean',        name: 'Cleaner & Disinfect' },
          { key: 'pest',         name: 'Pest Control' },
          { key: 'water',        name: 'Water Additives' },
          { key: 'equip',        name: 'Equipment' },
          { key: 'repairs',      name: 'Repairs' },
          { key: 'electric',     name: 'Electric' },
          { key: 'gas',          name: 'Natural Gas/Propane' },
          { key: 'coal',         name: 'Coal' },
          { key: 'loading',      name: 'Turkey Loading' },
          { key: 'shavings',     name: 'Shavings & Trucking' },
          { key: 'labor',        name: 'Labor' },
          { key: 'depreciation', name: 'Depreciation' },
          { key: 'fuel',         name: 'Fuel' },
        ];
        try {
          const [catSnap, itemSnap, expCatSnap, expItemSnap] = await Promise.all([
            db.collection('users').doc(this.user.uid).collection('invCategories').orderBy('createdAt','asc').get(),
            db.collection('users').doc(this.user.uid).collection('invItems').orderBy('createdAt','asc').get(),
            db.collection('users').doc(this.user.uid).collection('expCategories').orderBy('createdAt','asc').get(),
            db.collection('users').doc(this.user.uid).collection('expItems').orderBy('createdAt','asc').get(),
          ]);
          this.inventoryCategories = catSnap.docs.map(d => ({ docId: d.id, ...d.data() }));
          this.inventoryItems      = itemSnap.docs.map(d => ({ docId: d.id, ...d.data(), purchases: [] }));
          this.expenseCategories   = expCatSnap.docs.map(d => ({ docId: d.id, ...d.data() }));
          this.expenseItems        = expItemSnap.docs.map(d => ({ docId: d.id, ...d.data() }));

          // Auto-seed default categories for new users using a batch write (fast, one round-trip)
          if (this.inventoryCategories.length === 0) {
            const batch = db.batch();
            const now = new Date().toISOString();
            const newCats = [];
            for (const def of DEFAULT_CATS) {
              const invRef = db.collection('users').doc(this.user.uid).collection('invCategories').doc();
              const expRef = db.collection('users').doc(this.user.uid).collection('expCategories').doc();
              const invData = { name: def.name, expFieldKey: def.key, createdAt: now, collapsed: true, linkedExpCategoryId: expRef.id };
              const expData = { name: def.name, expFieldKey: def.key, createdAt: now, collapsed: true, linkedInvCategoryId: invRef.id };
              batch.set(invRef, invData);
              batch.set(expRef, expData);
              newCats.push({ docId: invRef.id, ...invData, expCatDocId: expRef.id });
              this.expenseCategories.push({ docId: expRef.id, ...expData });
            }
            await batch.commit();
            this.inventoryCategories = newCats;
          }

          // Load purchase history for each inventory item
          await Promise.all(this.inventoryItems.map(async item => {
            try {
              const pSnap = await db.collection('users').doc(this.user.uid).collection('invItems').doc(item.docId).collection('purchases').orderBy('createdAt','asc').get();
              item.purchases = pSnap.docs.map(d => ({ docId: d.id, ...d.data() }));
            } catch(e) { item.purchases = []; }
          }));
        } catch(e) { console.error('loadInventory error', e); this.inventoryCategories = []; this.inventoryItems = []; this.expenseCategories = []; this.expenseItems = []; }
      }

      async loadExpenses() {
        if (!this.user) return;
        try {
          const snap = await db.collection('users').doc(this.user.uid).collection('farmExpenses').orderBy('date','desc').get();
          this.expenses = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
        } catch(e) { this.expenses = []; }
      }

      // ── Category CRUD ──────────────────────────────────────────────────────

      async invAddCategory(name, expFieldKey = '') {
        if (!name.trim()) return;
        const now = new Date().toISOString();
        // Create inventory category — store expFieldKey to link back to flock expense field
        const catData = { name: name.trim(), createdAt: now, collapsed: true, expFieldKey: expFieldKey || '' };
        const catRef = await db.collection('users').doc(this.user.uid).collection('invCategories').add(catData);
        const newCat = { docId: catRef.id, ...catData };
        this.inventoryCategories.push(newCat);

        // Mirror: create matching expense category
        const expCatData = { name: name.trim(), createdAt: now, collapsed: true, linkedInvCategoryId: catRef.id, expFieldKey: expFieldKey || '' };
        const expCatRef = await db.collection('users').doc(this.user.uid).collection('expCategories').add(expCatData);
        newCat.linkedExpCategoryId = expCatRef.id;
        await db.collection('users').doc(this.user.uid).collection('invCategories').doc(catRef.id).update({ linkedExpCategoryId: expCatRef.id });
        this.expenseCategories.push({ docId: expCatRef.id, ...expCatData });

        this.render();
      }

      async invDeleteCategory(catId) {
        const cat = this.inventoryCategories.find(c => c.docId === catId);
        const batch = db.batch();
        // Delete inv category + items
        batch.delete(db.collection('users').doc(this.user.uid).collection('invCategories').doc(catId));
        this.inventoryItems.filter(i => i.categoryId === catId).forEach(i => {
          batch.delete(db.collection('users').doc(this.user.uid).collection('invItems').doc(i.docId));
        });
        // Delete matching expense category + its items
        if (cat && cat.linkedExpCategoryId) {
          batch.delete(db.collection('users').doc(this.user.uid).collection('expCategories').doc(cat.linkedExpCategoryId));
          this.expenseItems.filter(e => e.expCategoryId === cat.linkedExpCategoryId).forEach(e => {
            batch.delete(db.collection('users').doc(this.user.uid).collection('expItems').doc(e.docId));
          });
          this.expenseCategories = this.expenseCategories.filter(c => c.docId !== cat.linkedExpCategoryId);
          this.expenseItems = this.expenseItems.filter(e => e.expCategoryId !== cat.linkedExpCategoryId);
        }
        await batch.commit();
        this.inventoryCategories = this.inventoryCategories.filter(c => c.docId !== catId);
        this.inventoryItems = this.inventoryItems.filter(i => i.categoryId !== catId);
        this.render();
      }

      async invMoveCategoryUp(catId) {
        const cats = this.inventoryCategories;
        const idx = cats.findIndex(c => c.docId === catId);
        if (idx <= 0) return; // already first
        await this._swapCategoryOrder(cats[idx - 1], cats[idx]);
      }

      async invMoveCategoryDown(catId) {
        const cats = this.inventoryCategories;
        const idx = cats.findIndex(c => c.docId === catId);
        if (idx < 0 || idx >= cats.length - 1) return; // already last
        await this._swapCategoryOrder(cats[idx], cats[idx + 1]);
      }

      async _swapCategoryOrder(catA, catB) {
        // Swap createdAt timestamps so Firestore orderBy('createdAt') reflects new order
        const tmpTime = catA.createdAt;
        catA.createdAt = catB.createdAt;
        catB.createdAt = tmpTime;
        // Swap in-memory array positions
        const cats = this.inventoryCategories;
        const idxA = cats.indexOf(catA);
        const idxB = cats.indexOf(catB);
        cats[idxA] = catB;
        cats[idxB] = catA;
        // Persist both to Firestore
        const batch = db.batch();
        batch.update(db.collection('users').doc(this.user.uid).collection('invCategories').doc(catA.docId), { createdAt: catA.createdAt });
        batch.update(db.collection('users').doc(this.user.uid).collection('invCategories').doc(catB.docId), { createdAt: catB.createdAt });
        await batch.commit();
        this.render();
      }

      async invToggleCollapse(catId) {
        const cat = this.inventoryCategories.find(c => c.docId === catId);
        if (!cat) return;
        cat.collapsed = !cat.collapsed;
        await db.collection('users').doc(this.user.uid).collection('invCategories').doc(catId).update({ collapsed: cat.collapsed });
        this.render();
      }

      async expToggleCollapse(expCatId) {
        const cat = this.expenseCategories.find(c => c.docId === expCatId);
        if (!cat) return;
        cat.collapsed = !cat.collapsed;
        await db.collection('users').doc(this.user.uid).collection('expCategories').doc(expCatId).update({ collapsed: cat.collapsed });
        this.render();
      }

      async invRenameCategoryInline(catId, newName) {
        if (!newName.trim()) return;
        const cat = this.inventoryCategories.find(c => c.docId === catId);
        if (!cat) return;
        cat.name = newName.trim();
        await db.collection('users').doc(this.user.uid).collection('invCategories').doc(catId).update({ name: cat.name });
        // Mirror rename to expense category
        if (cat.linkedExpCategoryId) {
          const expCat = this.expenseCategories.find(c => c.docId === cat.linkedExpCategoryId);
          if (expCat) expCat.name = newName.trim();
          await db.collection('users').doc(this.user.uid).collection('expCategories').doc(cat.linkedExpCategoryId).update({ name: newName.trim() });
        }
      }

      // ── Sync PDF ingredients → Inventory & Expenses items ─────────────────
      // Creates/updates invItems under "Total Feed Cost" from PDF ingredients,
      // then sets expInvQtys[fCost] on the flock so costs show in flock edit view.
      async syncFeedIngredientsToInventory(ingredients) {
        if (!this.user || !ingredients || !ingredients.length) return;

        // Ensure inventory is loaded
        if (!this.inventoryCategories || this.inventoryCategories.length === 0) {
          await this.loadInventory();
        }

        // Find the "Total Feed Cost" inventory category
        const feedCat = (this.inventoryCategories || []).find(
          c => c.name === 'Total Feed Cost' || c.expFieldKey === 'fCost'
        );
        if (!feedCat) return;

        const baseTime = Date.now();
        if (!this.currentFlock.expInvQtys) this.currentFlock.expInvQtys = {};
        if (!this.currentFlock.expInvQtys['fCost']) this.currentFlock.expInvQtys['fCost'] = {};

        for (const [ingIdx, ing] of ingredients.entries()) {
          // Use per-item timestamp offset so Firestore orderBy('createdAt') preserves PDF order
          const now = new Date(baseTime + ingIdx).toISOString();
          const ingNameNorm = ing.name.trim().toUpperCase();
          const costPer = ing.units && ing.units > 0
            ? parseFloat((ing.cost / ing.units).toFixed(6)) : 0;

          // Check if an invItem with this name already exists
          let existingItem = (this.inventoryItems || []).find(
            i => i.categoryId === feedCat.docId &&
                 (i.name || '').trim().toUpperCase() === ingNameNorm
          );

          if (existingItem) {
            // Compute weighted average costPer across all reports imported
            let updCostPer, updQty;
            if (ing.isMixingCost) {
              // Mixing cost: simple running average of the flat cost
              const prevQty = parseFloat(existingItem.qty) || 0;
              const prevCost = parseFloat(existingItem.costPer) || 0;
              updQty = prevQty + 1;
              updCostPer = prevQty === 0
                ? ing.cost
                : parseFloat(((prevCost * prevQty + ing.cost) / updQty).toFixed(6));
            } else {
              // Regular ingredient: weighted average by lbs
              const prevQty  = parseFloat(existingItem.qty) || 0;
              const prevCost = parseFloat(existingItem.costPer) || 0;
              const newQty   = ing.units || 0;
              updQty = prevQty + newQty;
              updCostPer = updQty === 0
                ? costPer
                : parseFloat(((prevCost * prevQty + costPer * newQty) / updQty).toFixed(6));
            }
            existingItem.costPer   = updCostPer;
            existingItem.qty       = updQty;
            existingItem.createdAt = now;
            await db.collection('users').doc(this.user.uid)
              .collection('invItems').doc(existingItem.docId)
              .update({ costPer: updCostPer, qty: updQty, createdAt: now });
          } else {
            // Create new inventory item
            const invData = {
              categoryId: feedCat.docId,
              name: ing.name.trim(),
              unit: ing.isMixingCost ? 'batch' : 'lbs',
              costPer: ing.isMixingCost ? ing.cost : costPer,
              qty: ing.isMixingCost ? 1 : (ing.units || 0),
              createdAt: now
            };
            const invRef = await db.collection('users').doc(this.user.uid)
              .collection('invItems').add(invData);
            existingItem = { docId: invRef.id, ...invData, purchases: [] };
            this.inventoryItems.push(existingItem);

            // Mirror: create matching expense item under linked expense category
            if (feedCat.linkedExpCategoryId) {
              const expData = {
                expCategoryId: feedCat.linkedExpCategoryId,
                name: ing.name.trim(),
                unit: ing.isMixingCost ? 'batch' : 'lbs',
                costPer: ing.isMixingCost ? ing.cost : costPer,
                qty: ing.isMixingCost ? 1 : (ing.units || 0),
                amount: ing.cost || 0,
                createdAt: now,
                linkedInvItemId: invRef.id,
                qtyUserEntered: true
              };
              const expRef = await db.collection('users').doc(this.user.uid)
                .collection('expItems').add(expData);
              this.expenseItems = this.expenseItems || [];
              this.expenseItems.push({ docId: expRef.id, ...expData });
              existingItem.linkedExpItemId = expRef.id;
              await db.collection('users').doc(this.user.uid)
                .collection('invItems').doc(invRef.id)
                .update({ linkedExpItemId: expRef.id });
            }
          }

          // Set qty used for this flock (qty from PDF = lbs used this flock)
          this.currentFlock.expInvQtys['fCost'][existingItem.docId] = ing.units || 0;
        }

        // Re-sort in-memory inventoryItems to match Firestore createdAt order
        this.inventoryItems.sort((a, b) => {
          if (a.categoryId !== feedCat.docId || b.categoryId !== feedCat.docId) return 0;
          return (a.createdAt || '').localeCompare(b.createdAt || '');
        });

        // Persist expInvQtys to Firestore on the flock
        await db.collection('users').doc(this.user.uid)
          .collection('flocks').doc(this.currentFlock.docId)
          .update({ expInvQtys: this.currentFlock.expInvQtys });

        // Expand the feed category so user sees results immediately
        feedCat.collapsed = false;
        await db.collection('users').doc(this.user.uid)
          .collection('invCategories').doc(feedCat.docId)
          .update({ collapsed: false });
      }

      // ── Item CRUD ──────────────────────────────────────────────────────────

      async invAddItem(categoryId) {
        const cat = this.inventoryCategories.find(c => c.docId === categoryId);
        const now = new Date().toISOString();

        // Create inventory item
        const invData = { categoryId, name: 'New Item', unit: 'each', costPer: 0, qty: 0, createdAt: now };
        const invRef = await db.collection('users').doc(this.user.uid).collection('invItems').add(invData);
        const newInvItem = { docId: invRef.id, ...invData };
        this.inventoryItems.push(newInvItem);

        // Mirror: create matching expense item under the linked expense category
        if (cat && cat.linkedExpCategoryId) {
          const expData = { expCategoryId: cat.linkedExpCategoryId, name: 'New Item', unit: 'each', costPer: 0, qty: 0, amount: 0, createdAt: now, linkedInvItemId: invRef.id, qtyUserEntered: true };
          const expRef = await db.collection('users').doc(this.user.uid).collection('expItems').add(expData);
          const newExpItem = { docId: expRef.id, ...expData };
          this.expenseItems.push(newExpItem);
          // Cross-link
          newInvItem.linkedExpItemId = expRef.id;
          await db.collection('users').doc(this.user.uid).collection('invItems').doc(invRef.id).update({ linkedExpItemId: expRef.id });
        }

        this.render();
      }

      async invDeleteItem(itemId) {
        const item = this.inventoryItems.find(i => i.docId === itemId);
        const batch = db.batch();
        batch.delete(db.collection('users').doc(this.user.uid).collection('invItems').doc(itemId));
        // Mirror: delete linked expense item
        if (item && item.linkedExpItemId) {
          batch.delete(db.collection('users').doc(this.user.uid).collection('expItems').doc(item.linkedExpItemId));
          this.expenseItems = this.expenseItems.filter(e => e.docId !== item.linkedExpItemId);
        }
        await batch.commit();
        this.inventoryItems = this.inventoryItems.filter(i => i.docId !== itemId);
        this.render();
      }

      async invUpdateItemField(itemId, field, value) {
        const item = this.inventoryItems.find(i => i.docId === itemId);
        if (!item) return;
        if (field === 'costPer' || field === 'qty') value = parseFloat(value) || 0;
        item[field] = value;
        await db.collection('users').doc(this.user.uid).collection('invItems').doc(itemId).update({ [field]: value });

        // Mirror update to linked expense item (name and costPer only — qty is user-entered in expenses)
        if (item.linkedExpItemId) {
          const expItem = this.expenseItems.find(e => e.docId === item.linkedExpItemId);
          if (field === 'name' || field === 'unit' || field === 'costPer') {
            const expUpdates = { [field]: value };
            if (field === 'costPer') {
              // Recalculate amount using the expense item's own qty, not inventory qty
              const expQty = parseFloat(expItem ? expItem.qty : 0) || 0;
              expUpdates.amount = value * expQty;
            }
            if (expItem) Object.assign(expItem, expUpdates);
            await db.collection('users').doc(this.user.uid).collection('expItems').doc(item.linkedExpItemId).update(expUpdates);
          }
        }

        // Re-render just the total cell (lightweight)
        const totalEl = document.getElementById('inv-total-' + itemId);
        if (totalEl) {
          const total = (parseFloat(item.costPer)||0) * (parseFloat(item.qty)||0);
          totalEl.textContent = '$' + total.toFixed(2);
          totalEl.style.color = total > 0 ? '#22c55e' : '#555';
        }
        this._refreshCatTotal(item.categoryId);
        // Refresh expense category total too
        if (item.linkedExpItemId) {
          const expItem = this.expenseItems.find(e => e.docId === item.linkedExpItemId);
          if (expItem) this._refreshExpCatTotal(expItem.expCategoryId);
        }
      }

      async invRestock(itemId) {
        const item = this.inventoryItems.find(i => i.docId === itemId);
        if (!item) return;

        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
        const avgCost = parseFloat(item.costPer||0).toFixed(2);
        modal.innerHTML = `
          <div style="background:#1a1a1a;border:1px solid rgba(34,197,94,0.35);border-radius:16px;padding:26px;width:100%;max-width:400px;">
            <h3 style="color:#22c55e;margin-bottom:6px;">🛒 Restock — ${this.escapeHtml(item.name)}</h3>
            <p style="color:#555;font-size:0.85em;margin-bottom:20px;">Current: ${parseFloat(item.qty||0)} ${item.unit} @ avg $${avgCost}/${item.unit}</p>
            <div style="display:flex;flex-direction:column;gap:14px;">
              <div>
                <label style="color:#aaa;font-size:0.82em;display:block;margin-bottom:5px;">Qty purchased</label>
                <input id="rs-qty" type="number" min="0" step="1" placeholder="e.g. 10"
                  style="width:100%;padding:11px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:1em;">
              </div>
              <div>
                <label style="color:#aaa;font-size:0.82em;display:block;margin-bottom:5px;">Cost per ${item.unit} this purchase</label>
                <input id="rs-cost" type="number" min="0" step="0.01" placeholder="e.g. 30.00"
                  style="width:100%;padding:11px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:1em;">
              </div>
              <div id="rs-preview" style="background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.2);border-radius:8px;padding:12px;font-size:0.88em;color:#888;min-height:44px;"></div>
            </div>
            <div style="display:flex;gap:10px;margin-top:20px;">
              <button id="rs-save" style="flex:1;padding:12px;background:#22c55e;color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;">✅ Add Stock</button>
              <button id="rs-cancel" style="flex:1;padding:12px;background:rgba(255,255,255,0.07);color:#fff;border:none;border-radius:8px;cursor:pointer;">Cancel</button>
            </div>
          </div>`;
        document.body.appendChild(modal);

        const updatePreview = () => {
          const newQty  = parseFloat(document.getElementById('rs-qty').value)  || 0;
          const newCost = parseFloat(document.getElementById('rs-cost').value) || 0;
          const oldQty  = parseFloat(item.qty)     || 0;
          const oldCost = parseFloat(item.costPer) || 0;
          const totalQty = oldQty + newQty;
          const avgNew = totalQty > 0 ? ((oldQty * oldCost) + (newQty * newCost)) / totalQty : newCost;
          const el = document.getElementById('rs-preview');
          if (newQty > 0 && newCost > 0) {
            el.innerHTML = '<span style="color:#22c55e;font-weight:600;">New total: ' + totalQty + ' ' + '${item.unit}' + ' &nbsp;·&nbsp; Avg cost: $' + avgNew.toFixed(2) + '/' + '${item.unit}' + '</span>';
          } else {
            el.innerHTML = '<span style="color:#444;">Enter qty and cost to preview…</span>';
          }
        };
        document.getElementById('rs-qty').oninput  = updatePreview;
        document.getElementById('rs-cost').oninput = updatePreview;
        document.getElementById('rs-cancel').onclick = () => modal.remove();
        document.getElementById('rs-save').onclick = async () => {
          const newQty  = parseFloat(document.getElementById('rs-qty').value)  || 0;
          const newCost = parseFloat(document.getElementById('rs-cost').value) || 0;
          if (newQty <= 0)  { this.showToast('Enter a qty','error'); return; }
          if (newCost <= 0) { this.showToast('Enter a cost','error'); return; }

          const oldQty  = parseFloat(item.qty)     || 0;
          const oldCost = parseFloat(item.costPer) || 0;
          const totalQty = oldQty + newQty;
          const avgCostNew = ((oldQty * oldCost) + (newQty * newCost)) / totalQty;

          // Save purchase to history subcollection
          const histEntry = { qty: newQty, costPer: newCost, date: new Date().toISOString().slice(0,10), createdAt: new Date().toISOString() };
          await db.collection('users').doc(this.user.uid).collection('invItems').doc(itemId).collection('purchases').add(histEntry);

          // Update item
          item.qty     = totalQty;
          item.costPer = avgCostNew;
          if (!item.purchases) item.purchases = [];
          item.purchases.push(histEntry);
          await db.collection('users').doc(this.user.uid).collection('invItems').doc(itemId).update({ qty: totalQty, costPer: avgCostNew });

          // Sync name+costPer to expense item
          if (item.linkedExpItemId) {
            const expItem = this.expenseItems.find(e => e.docId === item.linkedExpItemId);
            if (expItem) { expItem.costPer = avgCostNew; }
            await db.collection('users').doc(this.user.uid).collection('expItems').doc(item.linkedExpItemId).update({ costPer: avgCostNew });
          }

          modal.remove();
          this.showToast('Restocked! New avg: $' + avgCostNew.toFixed(2) + '/' + item.unit);
          this.render();
        };
        setTimeout(() => document.getElementById('rs-qty').focus(), 50);
      }

      _refreshCatTotal(catId) {
        const items = this.inventoryItems.filter(i => i.categoryId === catId);
        const total = items.reduce((s,i) => s + (parseFloat(i.costPer)||0)*(parseFloat(i.qty)||0), 0);
        const el = document.getElementById('inv-cat-total-' + catId);
        if (el) el.textContent = '$' + total.toFixed(2);
      }

      async expUpdateItemQty(expItemId, value) {
        const item = this.expenseItems.find(i => i.docId === expItemId);
        if (!item) return;
        item.qty = parseFloat(value) || 0;
        item.amount = item.qty * (parseFloat(item.costPer) || 0);
        await db.collection('users').doc(this.user.uid).collection('expItems').doc(expItemId).update({
          qty: item.qty,
          amount: item.amount,
        });
        // Update total display
        const totalEl = document.getElementById('exp-total-' + expItemId);
        if (totalEl) {
          totalEl.textContent = '$' + item.amount.toFixed(2);
          totalEl.style.color = item.amount > 0 ? '#f59e0b' : '#555';
        }
        this._refreshExpCatTotal(item.expCategoryId);
      }

      _refreshExpCatTotal(expCatId) {
        const items = this.expenseItems.filter(i => i.expCategoryId === expCatId);
        const total = items.reduce((s,i) => s + (parseFloat(i.amount)||0), 0);
        const el = document.getElementById('exp-cat-total-' + expCatId);
        if (el) el.textContent = '$' + total.toFixed(2);
      }

      // ── Expenses CRUD ──────────────────────────────────────────────────────

      async saveExpense(expense) {
        const col = db.collection('users').doc(this.user.uid).collection('farmExpenses');
        if (expense.docId) {
          const { docId, ...data } = expense;
          await col.doc(docId).update(data);
        } else {
          const ref = await col.add(expense);
          expense.docId = ref.id;
        }
      }

      async deleteExpense(docId) {
        await db.collection('users').doc(this.user.uid).collection('farmExpenses').doc(docId).delete();
        this.expenses = this.expenses.filter(e => e.docId !== docId);
        this.render();
      }

        modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
        modal.innerHTML = `
          <div style="background:#1a1a1a;border:1px solid rgba(34,197,94,0.3);border-radius:14px;padding:24px;width:100%;max-width:380px;">
            <h3 style="color:#22c55e;margin-bottom:16px;">+ New Category</h3>
            <input id="new-cat-name" placeholder="e.g. Medications, Feed, Equipment…" autofocus
              style="width:100%;padding:11px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:1em;margin-bottom:16px;">
            <div style="display:flex;gap:10px;">

              <button id="new-cat-cancel" style="flex:1;padding:11px;background:rgba(255,255,255,0.07);color:#fff;border:none;border-radius:8px;cursor:pointer;">Cancel</button>
            </div>
          </div>`;
        document.body.appendChild(modal);
        const input = document.getElementById('new-cat-name');
        input.focus();
        document.getElementById('new-cat-cancel').onclick = () => modal.remove();
        document.getElementById('new-cat-save').onclick = async () => {
          const name = input.value.trim();
          if (!name) { input.style.borderColor='#ef4444'; return; }

        };
        input.onkeydown = e => { if(e.key==='Enter') document.getElementById('new-cat-save').click(); };

      // ─────────────────────────────────────────────────────────────────────────

      navigate(view) {
        this.currentView = view;
        this.mobileMenuOpen = false;
        // Lazy-load inventory data when navigating to that tab
        if (view === 'inventory' && (this.inventoryItems.length === 0 && this.expenses.length === 0)) {
          Promise.all([this.loadInventory(), this.loadExpenses()]).then(() => this.render());
        }
        this.render();
      }












      openReportView(source) {
        this.reportSource = source;
        if (source === 'flock') {
          this.reportFlock = this.currentFlock;
          this.currentView = 'report';
          this.render();
        } else if (source === 'summary') {
          // Build summary data before navigating
          const selectedFlocks = this.flocks.filter(f => this.selectedFlockIds.includes(f.docId));
          if (selectedFlocks.length === 0) {
            this.showToast('Please select flocks first', 'error');
            return;
          }
          const s = this.calculateSummary(selectedFlocks);
          const fmt = (v) => this.fmt(v);
          // Build flockRows for the table
          let flockRows = '';
          selectedFlocks.forEach(f => {
            const m = this.calculateMetrics(f);
            const profitColor = m.totalProfit >= 0 ? '#16a34a' : '#dc2626';
            flockRows += `<tr>
              <td style="padding:6px;border-bottom:1px solid #2a2a2a;">${this.escapeHtml(String(f.id||''))}</td>
              <td style="padding:6px;border-bottom:1px solid #2a2a2a;">${this.escapeHtml(f.barn||'—')}</td>
              <td style="padding:6px;border-bottom:1px solid #2a2a2a;">${m.adg?m.adg.toFixed(4):'—'}</td>
              <td style="padding:6px;border-bottom:1px solid #2a2a2a;">${m.fcr?m.fcr.toFixed(3):'—'}</td>
              <td style="padding:6px;border-bottom:1px solid #2a2a2a;">${m.livability?m.livability.toFixed(1)+'%':'—'}</td>
              <td style="padding:6px;border-bottom:1px solid #2a2a2a;">${m.ageDays?Math.round(m.ageDays)+'d':'—'}</td>
              <td style="padding:6px;border-bottom:1px solid #2a2a2a;">${f.weight?parseFloat(f.weight).toFixed(2)+' lbs':'—'}</td>
              <td style="padding:6px;border-bottom:1px solid #2a2a2a;">${m.profitPerBird!=null?'$'+m.profitPerBird.toFixed(2):'—'}</td>
              <td style="padding:6px;border-bottom:1px solid #2a2a2a;">${m.profitPerSqFt!=null?'$'+m.profitPerSqFt.toFixed(2):'—'}</td>
              <td style="padding:6px;border-bottom:1px solid #2a2a2a;">${m.sqFtPerBird?m.sqFtPerBird.toFixed(2):'—'}</td>
              <td style="padding:6px;border-bottom:1px solid #2a2a2a;">${f.pricePerLb?'$'+parseFloat(f.pricePerLb).toFixed(4):'—'}</td>
              <td style="padding:6px;border-bottom:1px solid #2a2a2a;color:${profitColor};font-weight:700;">${fmt(m.totalProfit)}</td>
            </tr>`;
          });
          // Build expense breakdown
          let expBreakdown = '';
          const expFields = [
            ['showFeed','feedLabel','fCost'], ['showPoult','poultLabel','pCost'],
            ['showMeds','medsLabel','meds'], ['showClean','cleanLabel','clean'],
            ['showPest','pestLabel','pest'], ['showWater','waterLabel','water'],
            ['showEquip','equipLabel','equip'], ['showRepairs','repairsLabel','repairs'],
            ['showElectric','electricLabel','electric'], ['showGas','gasLabel','gas'],
            ['showCoal','coalLabel','coal'], ['showLoading','loadingLabel','loading'],
            ['showShavings','shavingsLabel','shavings'], ['showLabor','laborLabel','labor'],
            ['showDep','depLabel','depreciation'], ['showFuel','fuelLabel','fuel'],
            ['showMisc1','misc1Label','misc1'], ['showMisc2','misc2Label','misc2'],
            ['showMisc3','misc3Label','misc3'], ['showMisc4','misc4Label','misc4']
          ];
          expFields.forEach(([showKey, labelKey, dataKey]) => {
            if (this.settings[showKey]) {
              const total = selectedFlocks.reduce((sum, f) => sum + (parseFloat(f[dataKey]) || 0), 0);
              if (total > 0) {
                expBreakdown += `<tr>
                  <td style="padding:8px 4px;border-bottom:1px solid #2a2a2a;">${this.escapeHtml(this.settings[labelKey] || dataKey)}</td>
                  <td style="padding:8px 4px;border-bottom:1px solid #2a2a2a;text-align:right;font-weight:700;">${fmt(total)}</td>
                </tr>`;
              }
            }
          });
          this.reportSummaryData = { s, selectedFlocks, flockRows, expenseBreakdown: expBreakdown };
          this.currentView = 'report';
          this.render();
        }
      }

      viewFlock(docId) {
        this.currentFlock = this.flocks.find(f => f.docId === docId);
        this.currentView = 'flock';
        this.flockTab = 'data';
        this.dailyLogs = [];
        // Load inventory if not already loaded (needed for expense field picker)
        if (!this.inventoryCategories || this.inventoryCategories.length === 0) {
          this.loadInventory().then(() => this.render());
        }
        this.render();
      }

      selectAllFlocks() {
        this.selectedFlockIds = this.flocks.map(f => f.docId);
        
        // Check all checkboxes without full re-render (prevents scroll jump)
        this.flocks.forEach(flock => {
          const checkbox = document.getElementById(`flock-${flock.docId}`);
          if (checkbox) checkbox.checked = true;
        });
        
        this.updateExportButtons();
      }

      selectNoFlocks() {
        this.selectedFlockIds = [];
        
        // Uncheck all checkboxes without full re-render (prevents scroll jump)
        this.flocks.forEach(flock => {
          const checkbox = document.getElementById(`flock-${flock.docId}`);
          if (checkbox) checkbox.checked = false;
        });
        
        this.updateExportButtons();
      }

      toggleFlockSelection(docId) {
        const index = this.selectedFlockIds.indexOf(docId);
        if (index > -1) {
          this.selectedFlockIds.splice(index, 1);
        } else {
          this.selectedFlockIds.push(docId);
        }
        
        // Update export button states without full re-render (prevents scroll jump)
        this.updateExportButtons();
      }
      
      updateExportButtons() {
        // Update CSV button
        const csvBtn = document.querySelector('button[onclick="app.exportToCSV()"]');
        const pdfBtn = document.querySelector('button[onclick="app.exportToPDF()"]');
        const reportBtn = document.getElementById('generateReportBtn');
        
        const isDisabled = this.selectedFlockIds.length === 0;
        
        if (csvBtn) {
          csvBtn.disabled = isDisabled;
          if (isDisabled) {
            csvBtn.style.opacity = '0.5';
            csvBtn.style.cursor = 'not-allowed';
          } else {
            csvBtn.style.opacity = '1';
            csvBtn.style.cursor = 'pointer';
          }
        }
        
        if (pdfBtn) {
          pdfBtn.disabled = isDisabled;
          if (isDisabled) {
            pdfBtn.style.opacity = '0.5';
            pdfBtn.style.cursor = 'not-allowed';
          } else {
            pdfBtn.style.opacity = '1';
            pdfBtn.style.cursor = 'pointer';
          }
        }
        
        if (reportBtn) {
          reportBtn.disabled = isDisabled;
          if (isDisabled) {
            reportBtn.style.opacity = '0.5';
            reportBtn.style.cursor = 'not-allowed';
          } else {
            reportBtn.style.opacity = '1';
            reportBtn.style.cursor = 'pointer';
          }
        }
      }
      
      generateReport() {
        if (this.selectedFlockIds.length === 0) {
          alert('Please select at least one flock to generate a report.');
          return;
        }
        
        // Scroll to top to show the report
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        // Re-render to show the report with selected flocks
        this.render();
      }

      async signOut() {
        if (confirm('Are you sure you want to sign out?')) {
          // Clean up intervals to prevent memory leaks
          if (this.draftSaveInterval) {
            clearInterval(this.draftSaveInterval);
            this.draftSaveInterval = null;
          }
          
          // Clean up all event listeners (v1.7 - memory leak fix)
          if (this.eventManager) {
            this.eventManager.clearAll();
          }
          
          // Disable navigation protection before logout
          this.navProtection.disable();
          
          this.pin = null;
          this.pinUnlocked = false;
          await auth.signOut();
        }
      }

      async switchAccount() {
        if (confirm('Sign out and switch to a different account?')) {
          // Clean up intervals to prevent memory leaks
          if (this.draftSaveInterval) {
            clearInterval(this.draftSaveInterval);
            this.draftSaveInterval = null;
          }
          
          // Clean up all event listeners
          if (this.eventManager) {
            this.eventManager.clearAll();
          }
          
          // Disable navigation protection before logout
          this.navProtection.disable();
          
          this.pin = null;
          this.pinUnlocked = false;
          await auth.signOut();
          
          // Show login screen
          this.render();
        }
      }

      async updateFarmName(event) {
        event.preventDefault();
        const newFarmName = this.sanitizeInput(document.getElementById('newFarmName').value.trim());
        
        if (!newFarmName) {
          this.showToast('Please enter a farm name', 'error');
          return;
        }

        if (newFarmName.length > 50) {
          this.showToast('Farm name must be 50 characters or less', 'error');
          return;
        }
        
        try {
          await db.collection('users').doc(this.user.uid).update({
            farmName: newFarmName
          });
          this.farmName = newFarmName;
          this.showToast('Farm name updated successfully!');
          this.render();
        } catch (error) {
          this.showToast('Failed to update farm name: ' + error.message, 'error');
        }
      }

        }

        }

      handleSaveFlock(event) {
        event.preventDefault();
        
        // CRITICAL: Check if account is frozen before allowing ANY form submission
        if (this.accountFrozen) {
          this.showToast('⚠️ Account Frozen: You cannot save changes. Contact your administrator.', 'error');
          return;
        }
        
        // Prevent double-save
        if (this.isSaving) {
          this.showToast('⏳ Save already in progress...', 'error');
          return;
        }
        
        const form = event.target;
        const formData = new FormData(form);
        
        // Get submit button and show loading state
        const submitBtn = form.querySelector('button[type="submit"]');
        const originalBtnText = submitBtn ? submitBtn.innerHTML : '';
        
        if (submitBtn) {
          submitBtn.innerHTML = '⏳ Saving...';
          submitBtn.disabled = true;
        }
        
        this.isSaving = true;

        // Validate required fields
        const flockId = parseInt(formData.get('id'));
        if (!flockId || flockId <= 0) {
          this.showToast('Flock ID is required and must be greater than 0', 'error');
          this.isSaving = false;
          if (submitBtn) {
            submitBtn.innerHTML = originalBtnText;
            submitBtn.disabled = false;
          }
          return;
        }

        // Save undo state before changes
        this.saveUndo(this.currentFlock);

        const updatedFlock = { ...this.currentFlock };
        
        updatedFlock.id = flockId;
        updatedFlock.barn = this.sanitizeInput((formData.get('barn') || '').trim()).slice(0, 50);
        updatedFlock.poultSupplier = this.sanitizeInput((formData.get('poultSupplier') || '').trim()).slice(0, 100);
        updatedFlock.hatchery = this.sanitizeInput((formData.get('hatchery') || '').trim()).slice(0, 100);
        updatedFlock.barnSqFt = parseFloat(formData.get('barnSqFt')) || 0;
        updatedFlock.startedDate = formData.get('startedDate') || '';
        updatedFlock.shippedDate = formData.get('shippedDate') || '';
        updatedFlock.weight = parseFloat(formData.get('weight')) || 0;
        updatedFlock.placed = this.cleanMoney(formData.get('placed'));
        updatedFlock.shipped = this.cleanMoney(formData.get('shipped'));
        updatedFlock.pricePerLb = parseFloat(formData.get('pricePerLb')) || 0;
        updatedFlock.revenue = this.cleanMoney(formData.get('revenue'));
        updatedFlock.feedLbs = this.cleanMoney(formData.get('feedLbs'));
        
        updatedFlock.fCost = this.cleanMoney(formData.get('fCost'));
        updatedFlock.pCost = this.cleanMoney(formData.get('pCost'));

        // Save dynamic sub-expense amounts for all expense fields
        const expFields = [
          { key: 'Feed', dataKey: 'fCost' }, { key: 'Poult', dataKey: 'pCost' },
          { key: 'Dep', dataKey: 'depreciation' }, { key: 'Fuel', dataKey: 'fuel' },
          { key: 'Meds', dataKey: 'meds' }, { key: 'Clean', dataKey: 'clean' },
          { key: 'Pest', dataKey: 'pest' }, { key: 'Water', dataKey: 'water' },
          { key: 'Equip', dataKey: 'equip' }, { key: 'Repairs', dataKey: 'repairs' },
          { key: 'Electric', dataKey: 'electric' }, { key: 'Gas', dataKey: 'gas' },
          { key: 'Coal', dataKey: 'coal' }, { key: 'Loading', dataKey: 'loading' },
          { key: 'Shavings', dataKey: 'shavings' }, { key: 'Labor', dataKey: 'labor' },
          { key: 'Misc1', dataKey: 'misc1' }, { key: 'Misc2', dataKey: 'misc2' },
          { key: 'Misc3', dataKey: 'misc3' }, { key: 'Misc4', dataKey: 'misc4' }
        ];

        updatedFlock.meds = this.cleanMoney(formData.get('meds'));
        updatedFlock.clean = this.cleanMoney(formData.get('clean'));
        updatedFlock.pest = this.cleanMoney(formData.get('pest'));
        updatedFlock.water = this.cleanMoney(formData.get('water'));
        updatedFlock.equip = this.cleanMoney(formData.get('equip'));
        updatedFlock.repairs = this.cleanMoney(formData.get('repairs'));
        updatedFlock.electric = this.cleanMoney(formData.get('electric'));
        updatedFlock.gas = this.cleanMoney(formData.get('gas'));
        updatedFlock.coal = this.cleanMoney(formData.get('coal'));
        updatedFlock.loading = this.cleanMoney(formData.get('loading'));
        updatedFlock.shavings = this.cleanMoney(formData.get('shavings'));
        updatedFlock.labor = this.cleanMoney(formData.get('labor'));
        updatedFlock.depreciation = this.cleanMoney(formData.get('depreciation'));
        updatedFlock.fuel = this.cleanMoney(formData.get('fuel'));
        updatedFlock.misc1 = this.cleanMoney(formData.get('misc1'));
        updatedFlock.misc2 = this.cleanMoney(formData.get('misc2'));
        updatedFlock.misc3 = this.cleanMoney(formData.get('misc3'));
        updatedFlock.misc4 = this.cleanMoney(formData.get('misc4'));

        // Validate dates
        if (updatedFlock.startedDate && updatedFlock.shippedDate) {
          const started = new Date(updatedFlock.startedDate);
          const shipped = new Date(updatedFlock.shippedDate);
          const today = new Date();
          today.setHours(0, 0, 0, 0); // Reset time for date-only comparison
          
          if (shipped < started) {
            this.showToast('❌ Shipped date cannot be before started date', 'error');
            this.isSaving = false;
            if (submitBtn) {
              submitBtn.innerHTML = originalBtnText;
              submitBtn.disabled = false;
            }
            return;
          }
          
          if (started > today) {
            this.showToast('❌ Started date cannot be in the future', 'error');
            this.isSaving = false;
            if (submitBtn) {
              submitBtn.innerHTML = originalBtnText;
              submitBtn.disabled = false;
            }
            return;
          }
        }

        // Validate shipped cannot exceed placed
        if (updatedFlock.shipped > updatedFlock.placed && updatedFlock.placed > 0) {
          this.showToast('Shipped birds cannot exceed placed birds', 'error');
          this.isSaving = false;
          if (submitBtn) {
            submitBtn.innerHTML = originalBtnText;
            submitBtn.disabled = false;
          }
          return;
        }

        this.currentFlock = updatedFlock;
        
        this.saveFlock(updatedFlock).then((success) => {
          if (success) {
            this.showToast('✓ Changes saved successfully!');
            this.clearDraft();
            // DON'T re-render - it wipes the form! Data is already saved.
          }
          // Error toast is already shown by saveFlock if it fails
        }).catch(error => {
          this.showToast('Failed to save: ' + error.message, 'error');
        }).finally(() => {
          // Reset loading state
          this.isSaving = false;
          if (submitBtn) {
            submitBtn.innerHTML = originalBtnText;
            submitBtn.disabled = false;
          }
        });
      }

      async handleImageUpload(event, docId) {
        const files = event.target.files;
        if (!files || files.length === 0) return;

        // Check if account is frozen
        if (this.accountFrozen) {
          this.showToast('⚠️ Account Frozen: You cannot upload images. Contact your administrator.', 'error');
          event.target.value = '';
          return;
        }

        // Check if image upload is enabled
        if (!this.settings.enableImageUpload) {
          this.showToast('📷 Photo uploads are disabled. Enable them in Settings to upload photos.', 'error');
          event.target.value = '';
          return;
        }

        // Check for API key
        if (!this.settings.imgbbApiKey || this.settings.imgbbApiKey.trim() === '') {
          this.showToast('⚠️ ImgBB API key not configured! Please add your API key in Settings → Photo Upload Feature.', 'error');
          event.target.value = '';
          return;
        }

        const flock = this.flocks.find(f => f.docId === docId);
        if (!flock) return;

        // Initialize images array if it doesn't exist
        if (!flock.images) {
          flock.images = [];
        }

        // Initialize imageMetadata array for storing delete URLs
        if (!flock.imageMetadata) {
          flock.imageMetadata = [];
        }

        const filesToUpload = Array.from(files);

        // Show loading toast
        this.showToast(`📸 Uploading ${filesToUpload.length} image(s) to ImgBB...`);

        let uploadedCount = 0;
        let failedCount = 0;

        try {
          // Upload each file to ImgBB
          for (let i = 0; i < filesToUpload.length; i++) {
            const file = filesToUpload[i];
            
            try {
              // Upload to ImgBB
              const result = await ImgBBUploader.upload(file, this.settings.imgbbApiKey);
              
              // Store the URL in the images array
              flock.images.push(result.url);
              
              // Store metadata (for potential deletion later)
              flock.imageMetadata.push({
                url: result.url,
                deleteUrl: result.deleteUrl,
                size: result.size,
                uploadedAt: new Date().toISOString()
              });
              
              uploadedCount++;
              
            } catch (uploadError) {
              console.error(`Failed to upload ${file.name}:`, uploadError);
              this.showToast(`❌ Failed to upload ${file.name}: ${uploadError.message}`, 'error');
              failedCount++;
            }
          }

          // Save to database if any uploads succeeded
          if (uploadedCount > 0) {
            await this.saveFlock(flock, true); // true = skip reload/re-render
            
            // Update current flock reference
            if (this.currentFlock && this.currentFlock.docId === docId) {
              this.currentFlock.images = [...flock.images];
              this.currentFlock.imageMetadata = [...flock.imageMetadata];
            }

            // Update ONLY the image gallery div — do NOT re-render the whole page
            // This preserves all unsaved form data
            const galleryDiv = document.getElementById(`flock-notes-images-${docId}`) || 
                               document.getElementById(`page-notes-images-${docId}`);
            if (galleryDiv) {
              if (flock.images && flock.images.length > 0) {
                galleryDiv.innerHTML = `
                  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px;">
                    ${flock.images.map((img, idx) => {
                      const escapedImg = img.replace(/"/g, '&quot;');
                      return `<div style="position: relative; border-radius: 8px; overflow: hidden; border: 2px solid #2a2a2a;">
                        <img src="${img}" alt="Flock photo ${idx + 1}" style="width: 100%; height: 150px; object-fit: cover; cursor: pointer;" onclick='app.viewImage("${escapedImg}")' />
                        <button onclick="app.deleteImage('${docId}', ${idx}); return false;" style="position: absolute; top: 4px; right: 4px; background: rgba(239, 68, 68, 0.9); border: none; border-radius: 50%; width: 28px; height: 28px; color: white; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center;">×</button>
                      </div>`;
                    }).join('')}
                  </div>`;
              }
            }

            this.showToast(`✓ ${uploadedCount} image(s) uploaded!${failedCount > 0 ? ` (${failedCount} failed)` : ''}`);
          } else {
            this.showToast('❌ All uploads failed. Check your API key and internet connection.', 'error');
          }

          // Clear the file input
          event.target.value = '';
        } catch (error) {
          console.error('Image upload error:', error);
          this.showToast('Failed to upload images: ' + error.message, 'error');
          event.target.value = '';
        }
      }

      viewImage(imageUrl) {
        // Create modal overlay
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.style.cursor = 'pointer';
        overlay.onclick = () => document.body.removeChild(overlay);
        
        const img = document.createElement('img');
        // imageUrl is now an ImgBB URL
        img.src = imageUrl;
        img.style.maxWidth = '90vw';
        img.style.maxHeight = '90vh';
        img.style.borderRadius = '8px';
        img.style.boxShadow = '0 20px 60px rgba(0,0,0,0.8)';
        
        overlay.appendChild(img);
        document.body.appendChild(overlay);
      }

      async deleteImage(docId, imageIndex) {
        // Check if account is frozen
        if (this.accountFrozen) {
          this.showToast('⚠️ Account Frozen: You cannot delete images. Contact your administrator.', 'error');
          return;
        }
        
        if (!confirm('Delete this image?')) return;

        const flock = this.flocks.find(f => f.docId === docId);
        if (!flock || !flock.images) return;

        // Try to delete from ImgBB if we have the delete URL
        if (flock.imageMetadata && flock.imageMetadata[imageIndex]) {
          const metadata = flock.imageMetadata[imageIndex];
          if (metadata.deleteUrl) {
            try {
              await ImgBBUploader.delete(metadata.deleteUrl);
            } catch (err) {
              console.warn('Could not delete from ImgBB (free tier images don\'t expire anyway):', err);
            }
          }
          // Remove metadata
          flock.imageMetadata.splice(imageIndex, 1);
        }

        // Remove image URL from array
        flock.images.splice(imageIndex, 1);

        try {
          await this.saveFlock(flock);
          
          // Update current flock if it's the one being viewed
          if (this.currentFlock && this.currentFlock.docId === docId) {
            this.currentFlock.images = [...flock.images];
            if (flock.imageMetadata) {
              this.currentFlock.imageMetadata = [...flock.imageMetadata];
            }
          }
          
          // ALWAYS re-render to show deletion immediately
          this.render();

          this.showToast('✓ Image deleted');
        } catch (error) {
          console.error('Delete image error:', error);
          this.showToast('Failed to delete image', 'error');
        }
      }

      async importMillReport(input) {
        const file = input.files[0];
        if (!file) return;
        input.value = '';

        if (file.type !== 'application/pdf') {
          this.showToast('⚠️ Please select a PDF file', 'error');
          return;
        }

        this.showToast('📄 Reading PDF…', 'info');

        try {
          if (!window.pdfjsLib) {
            await new Promise((resolve, reject) => {
              const script = document.createElement('script');
              script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
              script.onload = resolve;
              script.onerror = reject;
              document.head.appendChild(script);
            });
            window.pdfjsLib.GlobalWorkerOptions.workerSrc =
              'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          }

          const arrayBuffer = await file.arrayBuffer();
          const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;

          // Extract text line by line using Y position grouping
          let allItems = [];
          for (let p = 1; p <= pdf.numPages; p++) {
            const page = await pdf.getPage(p);
            const content = await page.getTextContent();
            content.items.forEach(item => {
              if (item.str.trim()) {
                allItems.push({ text: item.str, x: item.transform[4], y: item.transform[5] });
              }
            });
          }

          // Group into lines by Y (within 2pt tolerance), sort left to right, join with space
          const lineMap = {};
          allItems.forEach(item => {
            const yKey = Math.round(item.y / 2) * 2; // bucket to nearest 2pt
            if (!lineMap[yKey]) lineMap[yKey] = [];
            lineMap[yKey].push(item);
          });
          const lines = Object.keys(lineMap)
            .sort((a, b) => b - a) // top to bottom (PDF y=0 at bottom)
            .map(y => lineMap[y].sort((a, b) => a.x - b.x).map(i => i.text.trim()).filter(t => t).join(' '));

          // Parse lines — format is exactly:
          // INGREDIENT NAME  123,456.78  $1,234.56  $0.1234
          const ingredients = [];
          let inTable = false;

          for (const line of lines) {
            // Detect header row
            if (/^Ingredient\s+Units\s+Cost\s+Price/i.test(line)) { inTable = true; continue; }
            if (!inTable) continue;
            // Stop at totals section
            if (/^(Total Weight|Mixing Cost|Total Ton|Cost Per Ton|Total Cost|Maximix|Per Ton)/i.test(line)) continue;
            if (!line.trim()) continue;

            // Line must contain at least one $amount to be an ingredient
            // Pattern: NAME (words, may include numbers like 47%, 21%, 98%, 62.4%, 2.5)
            //          then UNITS (large number like 9,400.00 or 211,442.00)
            //          then $COST  then $PRICE
            // Regex: capture everything up to the units number, then grab first $ amount
            const match = line.match(/^(.+?)\s+([\d,]+\.\d{2})\s+\$([\d,]+\.\d{2})\s+\$([\d,]+\.\d{4,})$/);
            if (!match) continue;

            const name = match[1].trim().toUpperCase();
            const units = parseFloat(match[2].replace(/,/g, ''));
            const cost = parseFloat(match[3].replace(/,/g, ''));

            if (!name || cost <= 0) continue;
            if (!ingredients.find(ing => ing.name === name)) {
              ingredients.push({ name, cost, units });
            }
          }

          // Also grab Mixing Cost line — format: "Mixing Cost: $3,546.36"
          for (const line of lines) {
            const mixMatch = line.match(/^Mixing\s+Cost:\s*\$([\d,]+\.\d{2})/i);
            if (mixMatch) {
              const cost = parseFloat(mixMatch[1].replace(/,/g, ''));
              if (cost > 0) ingredients.push({ name: 'MIXING COST', cost, units: 1, isMixingCost: true });
              break;
            }
          }

          if (!ingredients.length) {
            throw new Error('No ingredients found — check this is a Maximix feed report PDF');
          }

          // ── Extract extra PDF fields ──────────────────────────────────────────
          let pdfFeedLbs = 0, pdfTotalCost = 0, pdfCostPerTon = 0, pdfTons = 0;
          let pdfRationName = '', pdfFlockId = '';

          for (const line of lines) {
            // Ration Name: "Ration Name:  My Ration"
            const rationMatch = line.match(/^Ration\s+Name:\s+(.+)/i);
            if (rationMatch && rationMatch[1].trim()) pdfRationName = rationMatch[1].trim();

            // Flock / Group: "Flock 164" or "Group: Something"
            const flockMatch = line.match(/^(?:Flock|Group)[:\s]+(.+)/i);
            if (flockMatch && flockMatch[1].trim()) pdfFlockId = flockMatch[1].trim();

            // Total Weight: "Total Weight: 1,006,610.75"
            const weightMatch = line.match(/Total\s+Weight:\s*([\d,]+\.?\d*)/i);
            if (weightMatch) pdfFeedLbs = parseFloat(weightMatch[1].replace(/,/g, ''));

            // Total Ton: "Total Ton: 503.31  Cost Per Ton: $330.76"
            const tonMatch = line.match(/Total\s+Ton:\s*([\d,]+\.?\d*)/i);
            if (tonMatch) pdfTons = parseFloat(tonMatch[1].replace(/,/g, ''));
            const cptMatch = line.match(/Cost\s+Per\s+Ton:\s*\$([\d,]+\.?\d*)/i);
            if (cptMatch) pdfCostPerTon = parseFloat(cptMatch[1].replace(/,/g, ''));

            // Total Cost: "Total Cost: $171,507.11"
            const totalCostMatch = line.match(/Total\s+Cost:\s*\$([\d,]+\.?\d*)/i);
            if (totalCostMatch) pdfTotalCost = parseFloat(totalCostMatch[1].replace(/,/g, ''));
          }
          // ─────────────────────────────────────────────────────────────────────

          // Sync ingredients into Inventory & Expenses (new system only)
          const total = ingredients.reduce((s, ing) => s + ing.cost, 0);
          this.currentFlock.fCost = total;
          await this.saveFlock(this.currentFlock, true);
          await this.syncFeedIngredientsToInventory(ingredients);
          this.showToast(`✅ Imported ${ingredients.length} ingredients — $${total.toFixed(2)} total`, 'success');

          // Navigate and re-render AFTER sync so all invItems + expInvQtys are in memory
          this.currentView = 'flock';
          this.render();
          // Auto-fill feedLbs from PDF Total Weight
          if (pdfFeedLbs > 0) {
            this.currentFlock.feedLbs = pdfFeedLbs;
            await this.saveFlock(this.currentFlock, true);
          }

          setTimeout(() => {
            if (pdfFeedLbs > 0) {
              const feedLbsInp = document.querySelector('input[name="feedLbs"]');
              if (feedLbsInp) feedLbsInp.value = pdfFeedLbs.toFixed(2);
            }
            const extras = [];
            if (pdfFeedLbs > 0) extras.push('Feed Lbs: ' + pdfFeedLbs.toLocaleString());
            if (pdfTons > 0) extras.push('Tons: ' + pdfTons.toFixed(2));
            if (pdfCostPerTon > 0) extras.push('$/Ton: $' + pdfCostPerTon.toFixed(2));
            if (pdfTotalCost > 0) extras.push('PDF Total: $' + pdfTotalCost.toFixed(2));
            if (pdfFlockId) extras.push('Flock: ' + pdfFlockId);
            if (pdfRationName) extras.push('Ration: ' + pdfRationName);
            if (extras.length > 0) this.showToast('Also from PDF — ' + extras.join(' | '), 'info');
          }, 150);

        } catch (err) {
          console.error('Mill report import error:', err);
          this.showToast('❌ ' + err.message, 'error');
        }
      }

      async importSettlement(input) {
        const file = input.files[0];
        if (!file) return;
        input.value = '';

        const isExcel = file.name.match(/\.(xls|xlsx)$/i);
        const isPDF   = file.type === 'application/pdf';

        if (!isExcel && !isPDF) {
          this.showToast('⚠️ Please select an Excel (.xls/.xlsx) or PDF settlement file', 'error');
          return;
        }

        this.showToast('📄 Reading settlement sheet…', 'info');

        try {
          let data = {}; // will hold parsed values

          if (isExcel) {
            // ---- SheetJS Excel parsing ----
            if (!window.XLSX) {
              await new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
                s.onload = resolve; s.onerror = reject;
                document.head.appendChild(s);
              });
            }
            const ab = await file.arrayBuffer();
            const wb = window.XLSX.read(ab, { type: 'array', cellDates: true });
            const ws = wb.Sheets[wb.SheetNames[0]]; // "Regular Settlement"
            const rows = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

            // Helper: find row where col0 matches label, return colN value
            const findVal = (label, col = 1) => {
              const row = rows.find(r => r[0] && String(r[0]).toLowerCase().trim().startsWith(label.toLowerCase()));
              return row ? row[col] : null;
            };
            const findVal4 = (label) => findVal(label, 4); // many values are in col 4 (index 4)
            const findVal5 = (label) => findVal(label, 5);

            const toISO = (v) => {
              if (!v) return '';
              const d = v instanceof Date ? v : new Date(v);
              if (isNaN(d)) return '';
              return d.toISOString().split('T')[0];
            };

            data.startedDate  = toISO(findVal('Placement Date', 1));
            data.shippedDate  = toISO(findVal('Process Date', 1));
            data.flockNumRaw  = findVal('Flock Number:', 1);
            data.headPlaced   = findVal('Head Placed:', 1);
            data.headDelivered = findVal('Head Delivered:', 1);
            data.liveAvgWt    = findVal('Live Avg. Wt.:', 1);
            data.poultSource  = findVal('Flock Number:', 5); // col E has Poult Source value
            // Poult Source is on the 'Flock Number' row col 5
            const flockNumRow = rows.find(r => r[0] && String(r[0]).toLowerCase().includes('flock number'));
            if (flockNumRow) data.poultSource = flockNumRow[5] || null;
            const placementRow = rows.find(r => r[0] && String(r[0]).toLowerCase().includes('placement date'));
            if (placementRow) data.breed = placementRow[5] || null;

            data.revenue      = findVal('Net Adjusted Live Payment', 4)
                              || findVal('Net Live Payment', 4);
            data.pricePerLb   = findVal('Grower Payment per Net Live Pound', 5);
            data.feedLbsPerBird = findVal4(' - Feed Pounds per Bird');
            data.feedConv     = findVal4(' - Feed Conversion');
            data.liveHaul     = findVal('Standard Live Haul Charge', 4);
            if (data.liveHaul && data.liveHaul < 0) data.liveHaul = Math.abs(data.liveHaul);

          } else {
            // ---- PDF.js fallback (for text-based PDFs) ----
            if (!window.pdfjsLib) {
              await new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
                s.onload = resolve; s.onerror = reject;
                document.head.appendChild(s);
              });
              window.pdfjsLib.GlobalWorkerOptions.workerSrc =
                'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            }
            const ab = await file.arrayBuffer();
            const pdf = await window.pdfjsLib.getDocument({ data: ab }).promise;
            let text = '';
            for (let p = 1; p <= pdf.numPages; p++) {
              const page = await pdf.getPage(p);
              const content = await page.getTextContent();
              text += content.items.map(i => i.str).join(' ') + '\n';
            }
            if (!text.trim()) {
              this.showToast('⚠️ This PDF is a scanned image — please use the Excel (.xls) version instead', 'error');
              return;
            }
            const exN = (pat) => { const m = text.match(pat); return m ? parseFloat(m[1].replace(/,/g,'')) : null; };
            const exS = (pat) => { const m = text.match(pat); return m ? m[1].trim() : null; };
            const toISO = (str) => { if (!str) return ''; const d = new Date(str); return isNaN(d) ? '' : d.toISOString().split('T')[0]; };

            data.startedDate  = toISO(exS(/Placement\s+Date\s+(\w+ \d+,?\s*\d{4})/i));
            data.shippedDate  = toISO(exS(/Process\s+Date[^:]*:?\s*(\w+ \d+,?\s*\d{4})/i));
            data.flockNumRaw  = exS(/Flock\s+Number\s+([\w\-]+)/i);
            data.headPlaced   = exN(/Head\s+Placed\s+([\d,]+)/i);
            data.headDelivered = exN(/Head\s+Delivered\s+([\d,]+)/i);
            data.liveAvgWt    = exN(/Live\s+Avg\.?\s*Wt\.?\s*[:\s]+([\d.]+)/i);
            data.revenue      = exN(/Net\s+Adjusted\s+Live\s+Payment\s+\$([\d,]+\.?\d*)/i);
            data.pricePerLb   = exN(/Grower\s+Payment\s+per\s+Net\s+Live\s+Pound\s+\$([\d.]+)/i);
            data.feedLbsPerBird = exN(/Feed\s+Pounds\s+per\s+Bird\s+([\d.]+)/i);
            data.feedConv     = exN(/Feed\s+Conversion\s+([\d.]+)/i);
            data.liveHaul     = exN(/Standard\s+Live\s+Haul\s+Charge\s+\(\$([\d,]+\.?\d*)\)/i);
            data.poultSource  = exS(/Poult\s+Source\s*:?\s*([\w\-]+)/i);
            data.breed        = exS(/Breed\s*:?\s*([\w\-]+)/i);
          }

          // ---- Apply to flock ----
          const filled = [];

          if (data.flockNumRaw) {
            const n = parseInt(String(data.flockNumRaw).replace(/\D/g,''));
            if (n) { this.currentFlock.id = n; filled.push('Flock #'); }
          }
          if (data.startedDate)   { this.currentFlock.startedDate = data.startedDate;   filled.push('Start Date'); }
          if (data.shippedDate)   { this.currentFlock.shippedDate = data.shippedDate;   filled.push('Shipped Date'); }
          if (data.headPlaced)    { this.currentFlock.placed = data.headPlaced;          filled.push('Placed'); }
          if (data.headDelivered) { this.currentFlock.shipped = data.headDelivered;      filled.push('Shipped'); }
          if (data.liveAvgWt)     { this.currentFlock.weight = data.liveAvgWt;           filled.push('Avg Weight'); }
          if (data.revenue)       { this.currentFlock.revenue = Math.round(data.revenue * 100) / 100; filled.push('Revenue'); }
          if (data.pricePerLb)    { this.currentFlock.pricePerLb = data.pricePerLb;      filled.push('Price/lb'); }
          if (data.feedLbsPerBird && data.headDelivered) {
            this.currentFlock.feedLbs = Math.round(data.feedLbsPerBird * data.headDelivered);
            filled.push('Feed Lbs');
          }
          if (data.liveHaul)      { this.currentFlock.loading = Math.round(data.liveHaul * 100) / 100; filled.push('Live Haul/Loading'); }
          if (data.poultSource)   { this.currentFlock.poultSupplier = String(data.poultSource); filled.push('Poult Source'); }
          if (data.breed)         { this.currentFlock.hatchery = String(data.breed); filled.push('Breed'); }
          if (data.feedConv) {
            const fcNote = 'FCR: ' + parseFloat(data.feedConv).toFixed(3);
            if (!this.currentFlock.notes || !this.currentFlock.notes.includes('FCR:')) {
              this.currentFlock.notes = this.currentFlock.notes ? this.currentFlock.notes + '\n' + fcNote : fcNote;
              filled.push('FCR → Notes');
            }
          }

          if (filled.length === 0) {
            this.showToast('⚠️ No matching data found — check this is a Dakota Provisions settlement', 'error');
            return;
          }

          // Save to Firestore only if flock has a valid ID
          if (this.currentFlock.id && this.currentFlock.id > 0) {
            try {
              await this.saveFlock(this.currentFlock, true);
            } catch(saveErr) {
              // Don't block UI — data is already in currentFlock, just show warning
              console.warn('Settlement save error:', saveErr.message);
            }
          }

          // Re-render so form shows imported values
          this.render();

          // Also fill DOM inputs directly after render in case render beats the state update
          setTimeout(() => {
            const fillInput = (name, val) => {
              if (val === null || val === undefined || val === '') return;
              const el = document.querySelector('[name="' + name + '"]');
              if (el) el.value = val;
            };
            if (data.flockNumRaw) { const n = parseInt(String(data.flockNumRaw).replace(/\D/g,'')); if(n) fillInput('id', n); }
            fillInput('startedDate',  data.startedDate);
            fillInput('shippedDate',  data.shippedDate);
            fillInput('placed',       data.headPlaced);
            fillInput('shipped',      data.headDelivered);
            fillInput('weight',       data.liveAvgWt);
            fillInput('revenue',      data.revenue       ? data.revenue.toFixed(2)   : null);
            fillInput('pricePerLb',   data.pricePerLb    ? data.pricePerLb.toFixed(4) : null);
            fillInput('feedLbs',      data.feedLbsPerBird && data.headDelivered ? Math.round(data.feedLbsPerBird * data.headDelivered) : null);
            fillInput('loading',      data.liveHaul      ? data.liveHaul.toFixed(2)  : null);
            fillInput('poultSupplier', data.poultSource);
            fillInput('hatchery',     data.breed);
          }, 50);

          this.showToast('✅ Imported ' + filled.length + ' fields: ' + filled.join(', '), 'success');

        } catch (err) {
          this.showToast('❌ Settlement import failed: ' + err.message, 'error');
        }
      }

          'Feed': 'Total Feed Cost', 'Poult': 'Poult Cost',

          'Dep': 'Depreciation', 'Fuel': 'Fuel',

        const matchingCatName = expKeyToCatName[expKey] || this.settings[labelKey];
        const matchingCat = (this.inventoryCategories||[]).find(c => c.name === matchingCatName);
        const invItems = matchingCat
          ? (this.inventoryItems||[]).filter(i => i.categoryId === matchingCat.docId && i.name && i.name !== 'New Item')

      onInvItemQtyChange(dataKey, itemId, qtyStr) {
        if (!this.currentFlock.expInvQtys) this.currentFlock.expInvQtys = {};
        if (!this.currentFlock.expInvQtys[dataKey]) this.currentFlock.expInvQtys[dataKey] = {};
        const qty = parseFloat(qtyStr) || 0;
        this.currentFlock.expInvQtys[dataKey][itemId] = qty;
        const item = (this.inventoryItems||[]).find(i => i.docId === itemId);
        if (!item) return;
        const lineTotal = qty * parseFloat(item.costPer || 0);
        // Update line total
        const lineEl = document.getElementById('inv-line-' + dataKey + '-' + itemId);
        if (lineEl) lineEl.textContent = '$' + lineTotal.toFixed(2);
        // Recompute field total
        const allItems = (this.inventoryItems||[]).filter(i => {
          const cat = (this.inventoryCategories||[]).find(c => c.docId === i.categoryId);
          return cat && document.getElementById('inv-line-' + dataKey + '-' + i.docId);
        });
        const fieldTotal = Object.entries(this.currentFlock.expInvQtys[dataKey]).reduce((sum, [id, q]) => {
          const it = (this.inventoryItems||[]).find(i => i.docId === id);
          return sum + (it ? parseFloat(q||0) * parseFloat(it.costPer||0) : 0);
        }, 0);
        const fieldTotalEl = document.getElementById('inv-field-total-' + dataKey);
        if (fieldTotalEl) fieldTotalEl.textContent = '$' + fieldTotal.toFixed(2);
        // Sync to the total input on top so the form saves it
        const input = document.getElementById('exp-total-input-' + dataKey);
        if (input) input.value = fieldTotal.toFixed(2);
      }
