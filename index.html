      async downloadBackup() {
        try {
          // Gather all data
          const backupData = {
            version: '1.0',
            exportDate: new Date().toISOString(),
            farmName: this.farmName,
            settings: this.settings,
            flocks: this.flocks,
            userEmail: this.user.email
          };

          // Encrypt the backup with PIN
          const encryptedData = this.encrypt(backupData, this.pin);
          
          if (!encryptedData) {
            this.showToast('Failed to encrypt backup', 'error');
            return;
          }

          // Create download
          const blob = new Blob([encryptedData], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          const date = new Date().toISOString().split('T')[0];
          a.href = url;
          a.download = `FlockPro_Backup_${this.farmName || 'data'}_${date}.json`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);

          this.showToast('✓ Backup downloaded successfully!');
        } catch (error) {
          this.showToast('Failed to create backup: ' + error.message, 'error');
          console.error('Backup error:', error);
        }
      }

      handleRestoreFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const encryptedData = e.target.result;
            
            // Try to decrypt with current PIN
            const decryptedData = this.decrypt(encryptedData, this.pin);
            
            if (!decryptedData) {
              this.showToast('Failed to decrypt backup. Make sure you\'re using the same PIN.', 'error');
              return;
            }

            // Validate backup data
            if (!decryptedData.flocks || !Array.isArray(decryptedData.flocks)) {
              this.showToast('Invalid backup file format', 'error');
              return;
            }

            // Show confirmation modal
            this.showConfirm({
              title: 'Restore Backup',
              message: `This will restore ${decryptedData.flocks.length} flock(s) from ${new Date(decryptedData.exportDate).toLocaleDateString()}. 
              
Current data will be REPLACED. Are you sure?`,
              icon: '⚠️',
              confirmText: 'Restore',
              cancelText: 'Cancel',
              isDanger: true
            }).then(confirmed => {
              if (confirmed) {
                this.restoreBackup(decryptedData);
              }
            });

          } catch (error) {
            this.showToast('Failed to read backup file: ' + error.message, 'error');
            console.error('Restore error:', error);
          }
        };
        reader.readAsText(file);
        
        // Reset file input
        event.target.value = '';
      }

      async restoreBackup(backupData) {
        try {
          // Delete existing flocks
          const snapshot = await db.collection('users')
            .doc(this.user.uid)
            .collection('flocks')
            .get();
          
          const batch1 = db.batch();
          snapshot.docs.forEach(doc => {
            batch1.delete(doc.ref);
          });
          await batch1.commit();

          // Restore flocks
          const batch2 = db.batch();
          backupData.flocks.forEach(flock => {
            const docRef = db.collection('users')
              .doc(this.user.uid)
              .collection('flocks')
              .doc();
            
            // Remove the old docId and let Firestore create a new one
            const { docId, ...flockData } = flock;
            batch2.set(docRef, flockData);
          });
          await batch2.commit();

          // Restore settings if available
          if (backupData.settings) {
            this.settings = { ...this.getDefaultSettings(), ...backupData.settings };
            this.saveSettings();
          }

          // Restore farm name if available
          if (backupData.farmName) {
            await db.collection('users').doc(this.user.uid).update({
              farmName: backupData.farmName
            });
            this.farmName = backupData.farmName;
          }

          // Reload data
          await this.loadFlocks();
          
          this.showToast(`✓ Restored ${backupData.flocks.length} flock(s) successfully!`);
          this.navigate('flocks');
        } catch (error) {
          this.showToast('Failed to restore backup: ' + error.message, 'error');
          console.error('Restore error:', error);
        }
      }
      
      // Auto-backup functionality
      async checkAutoBackup() {
        if (!this.settings.autoBackupEnabled) return;
        
        const now = new Date();
        const lastBackup = this.settings.lastAutoBackup ? new Date(this.settings.lastAutoBackup) : null;
        
        if (!lastBackup) {
          // Never backed up before, do it now
          await this.performAutoBackup();
          return;
        }
        
        const daysSinceBackup = Math.floor((now - lastBackup) / (1000 * 60 * 60 * 24));
        
        let shouldBackup = false;
        switch (this.settings.autoBackupFrequency) {
          case 'daily':
            shouldBackup = daysSinceBackup >= 1;
            break;
          case 'weekly':
            shouldBackup = daysSinceBackup >= 7;
            break;
          case 'monthly':
            shouldBackup = daysSinceBackup >= 30;
            break;
        }
        
        if (shouldBackup) {
          await this.performAutoBackup();
        }
      }
      
      async performAutoBackup() {
        try {
          // Gather all data
          const backupData = {
            version: '1.0',
            exportDate: new Date().toISOString(),
            farmName: this.farmName,
            settings: this.settings,
            flocks: this.flocks,
            userEmail: this.user.email
          };

          // Encrypt the backup with PIN
          const encryptedData = this.encrypt(backupData, this.pin);
          
          if (!encryptedData) {
            console.error('Failed to encrypt auto-backup');
            return;
          }

          // Create download
          const blob = new Blob([encryptedData], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          const date = new Date().toISOString().split('T')[0];
          const time = new Date().toTimeString().split(' ')[0].replace(/:/g, '-');
          a.href = url;
          a.download = `FlockPro_AutoBackup_${this.farmName || 'data'}_${date}_${time}.json`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);

          // Update last backup timestamp
          this.settings.lastAutoBackup = new Date().toISOString();
          await this.saveSettings();

          this.showToast('✓ Auto-backup completed!');
        } catch (error) {
          console.error('Auto-backup error:', error);
          this.showToast('Auto-backup failed: ' + error.message, 'error');
        }
      }

      // Session Timeout Management
      startSessionTimer() {
        this.resetSessionTimer();

        ['mousedown', 'keydown', 'scroll', 'touchstart'].forEach(event => {
          document.addEventListener(event, () => this.resetSessionTimer(), { passive: true });
        });
      }
      
      resetSessionTimer() {
        this.lastActivity = Date.now();
        
        // Clear existing timers
        if (this.sessionTimeoutWarning) clearTimeout(this.sessionTimeoutWarning);
        if (this.sessionTimeoutKill) clearTimeout(this.sessionTimeoutKill);
        
        // 25 minutes: show warning
        this.sessionTimeoutWarning = setTimeout(() => {
          this.showSessionWarning();
        }, 25 * 60 * 1000);
        
        // 30 minutes: auto logout
        this.sessionTimeoutKill = setTimeout(() => {
          this.showToast('Session expired. Logging out...', 'warning');
          setTimeout(() => this.signOut(), 2000);
        }, 30 * 60 * 1000);
      }

      // Image Viewer with Zoom
      showImageViewer(imageUrl) {
        const viewer = document.createElement('div');
        viewer.className = 'image-viewer-modal';
        viewer.innerHTML = `
          <div class="image-viewer-content">
            <button class="image-viewer-close">×</button>
            <img src="${imageUrl}" alt="Flock Photo">
          </div>
        `;
        
        document.body.appendChild(viewer);
        
        const img = viewer.querySelector('img');
        const closeBtn = viewer.querySelector('.image-viewer-close');
        
        // Pinch to zoom
        let initialDistance = 0;
        let currentScale = 1;
        
        img.addEventListener('touchstart', (e) => {
          if (e.touches.length === 2) {
            initialDistance = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY
            );
          }
        });
        
        img.addEventListener('touchmove', (e) => {
          if (e.touches.length === 2) {
            const currentDistance = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY
            );
            const scale = currentDistance / initialDistance;
            currentScale = Math.min(Math.max(0.5, currentScale * scale), 3);
            img.style.transform = `scale(${currentScale})`;
            initialDistance = currentDistance;
          }
        });
        
        closeBtn.onclick = () => viewer.remove();
        viewer.onclick = (e) => {
          if (e.target === viewer) viewer.remove();
        };
      }

      // Create Profit Trend Chart
      createProfitChart(canvasId) {
        if (this.chartInstances[canvasId]) {
          this.chartInstances[canvasId].destroy();
        }
        
        const shippedFlocks = this.flocks
          .filter(f => f.shipped > 0)
          .sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
        
        if (shippedFlocks.length === 0) return;
        
        const ctx = document.getElementById(canvasId);
        if (!ctx) return;
        
        const data = {
          labels: shippedFlocks.map(f => f.id),
          datasets: [{
            label: 'Profit per Flock',
            data: shippedFlocks.map(f => ((f.revenue || 0) - this.calcTotalExpenses(f)) / 100),
            borderColor: '#22c55e',
            backgroundColor: 'rgba(34, 197, 94, 0.1)',
            borderWidth: 3,
            tension: 0.4,
            fill: true
          }]
        };
        
        this.chartInstances[canvasId] = new Chart(ctx, {
          type: 'line',
          data: data,
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: { color: '#fff' }
              },
              tooltip: {
                callbacks: {
                  label: (context) => `Profit: $${context.parsed.y.toFixed(2)}`
                }
              }
            },
            scales: {
              y: {
                ticks: { color: '#888' },
                grid: { color: '#2a2a2a' }
              },
              x: {
                ticks: { color: '#888' },
                grid: { color: '#2a2a2a' }
              }
            }
          }
        });
      }
      
      // Get Best/Worst Performers
      getPerformanceStats() {
        const shippedFlocks = this.flocks.filter(f => f.shipped > 0);
        if (shippedFlocks.length === 0) return null;
        
        const profits = shippedFlocks.map(f => ({
          id: f.id,
          profit: ((f.revenue || 0) - this.calcTotalExpenses(f)) / 100
        }));
        
        profits.sort((a, b) => b.profit - a.profit);
        
        return {
          best: profits[0],
          worst: profits[profits.length - 1],
          average: profits.reduce((sum, f) => sum + f.profit, 0) / profits.length
        };
      }
      
      // Export to PDF
      async exportToPDF() {
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF();
          
          doc.setFontSize(18);
          doc.text('FlockPro Report', 14, 20);
          doc.setFontSize(11);
          doc.text(`Generated: ${new Date().toLocaleDateString()}`, 14, 28);
          
          const tableData = this.flocks.filter(f => f.shipped > 0).map(f => [
            f.id,
            f.barn || '-',
            f.shipped.toString(),
            `$${(((f.revenue || 0) - this.calcTotalExpenses(f)) / 100).toFixed(2)}`
          ]);
          
          doc.autoTable({
            head: [['Flock ID', 'Barn', 'Birds Shipped', 'Profit']],
            body: tableData,
            startY: 35,
            theme: 'grid',
            headStyles: { fillColor: [34, 197, 94] }
          });
          
          doc.save(`FlockPro_Report_${Date.now()}.pdf`);
          this.showToast('✓ PDF downloaded!');
        } catch (error) {
          this.showToast('PDF export failed: ' + error.message, 'error');
        }
      }
    }

    function closePreviewOverlay() {
      const overlay = document.getElementById('printPreviewOverlay');

    // ===== MORTALITY SHEET =====
    function showMortalitySheet() {
      if (!app || !app.currentFlock) return;
      const overlay = document.getElementById('printPreviewOverlay');
      const body    = document.getElementById('printPreviewBody');
      body.innerHTML = '<p style="text-align:center;padding:40px;color:#888;">Loading...</p>';
      openPreviewOverlay();

      app.loadDailyLogs().catch(()=>{}).then(() => {
        const flock      = app.currentFlock;
        const logs       = app.dailyLogs || [];
        const farmName   = (app.settings && app.settings.farmName) || 'Farm';
        const flockId    = flock.id || '—';
        const placed     = parseFloat(String(flock.placed||flock.birdsPlaced||flock.numBirds||0).replace(/[,$]/g,'')) || 0;
        const placedDate = flock.placedDate || flock.startDate || flock.startedDate || null;
        const base       = placedDate ? new Date(placedDate + 'T00:00:00') : null;
        const now        = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
        const DAYS       = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const WEEKS      = 22;
        const fmt        = d => String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
        const toYMD      = d => d.toISOString().split('T')[0];

        const deaths = {};
        logs.forEach(l => { if (l.date) deaths[l.date] = (deaths[l.date]||0)+(l.deaths||0); });

        let running = 0, maxWk = 0;
        const weeks = [];
        for (let w=0; w<WEEKS; w++) {
          let wkDeaths=0, wkStart=null, wkEnd=null;
          const days=[];
          for (let d=0; d<7; d++) {
            const idx = w*7+d;
            let n=0, lbl='D'+(idx+1);
            if (base) {
              const dt = new Date(base); dt.setDate(base.getDate()+idx);
              lbl = fmt(dt); n = deaths[toYMD(dt)]||0;
              if (d===0) wkStart=dt; if (d===6) wkEnd=dt;
            }
            wkDeaths+=n; days.push({n,lbl});
          }
          running+=wkDeaths;
          if (wkDeaths>maxWk) maxWk=wkDeaths;
          const range = base ? fmt(wkStart)+'–'+fmt(wkEnd) : 'D'+((w*7)+1)+'–D'+((w+1)*7);
          const mort  = placed>0&&wkDeaths>0 ? ((wkDeaths/placed)*100).toFixed(2)+'%' : '—';
          const livab = placed>0 ? (((placed-running)/placed)*100).toFixed(2)+'%' : '—';
          weeks.push({w:w+1, days, wkDeaths, running, mort, livab, range});
        }

        const totalDead = logs.reduce((s,l)=>s+(l.deaths||0),0);
        const totalMort = placed>0 ? ((totalDead/placed)*100).toFixed(2)+'%' : 'N/A';
        const finalLiv  = placed>0 ? (((placed-totalDead)/placed)*100).toFixed(2)+'%' : 'N/A';
        const avg       = totalDead/WEEKS;

        const rows = weeks.map(wk => {
          const hot    = wk.wkDeaths>0 && wk.wkDeaths>=avg*1.5;
          const hasAny = wk.wkDeaths>0;
          const rowBg  = hot?'#fff0f0':hasAny?'#fffbf0':'#fff';
          const wkColor= hot?'#dc2626':'#16a34a';

          const dayCells = wk.days.map(day =>
            `<td style="text-align:center;padding:2px 4px;border:1px solid #eee;white-space:nowrap;">` +
            `<div style="font-size:${day.n>0?36:28}px;font-weight:${day.n>0?800:300};color:${day.n>0?'#dc2626':'#ddd'};line-height:1;">${day.n>0?day.n:'—'}</div>` +
            `</td>`
          ).join('');

          return `<tr style="background:${rowBg};border-bottom:1px solid #eee;">
            <td style="padding:4px 6px;border-right:2px solid #ddd;white-space:nowrap;width:1%;">
              <span style="font-weight:800;font-size:30px;color:${wkColor};">Wk ${wk.w}</span>
            </td>
            ${dayCells}
            <td style="text-align:center;padding:2px 8px;border-left:2px solid #ddd;font-size:26px;font-weight:700;color:${hasAny?'#dc2626':'#ccc'};white-space:nowrap;">${hasAny?wk.wkDeaths:'—'}</td>
            <td style="text-align:center;padding:2px 8px;border-left:2px solid #ddd;font-size:26px;font-weight:700;color:#16a34a;white-space:nowrap;">${wk.livab}</td>
          </tr>`;
        }).join('');

        body.innerHTML = `
          <div style="font-family:Arial,sans-serif;color:#111;padding:12px;">
            <div style="margin-bottom:10px;">
              <div style="font-size:20px;font-weight:800;">${farmName} <span style="font-size:15px;font-weight:400;color:#555;">Flock #${flockId} · ${now}</span></div>
              ${placedDate?`<div style="font-size:12px;color:#aaa;">Placed: ${placedDate}</div>`:''}
            </div>
            <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
              ${[
                {lbl:'Birds Placed', val:placed>0?placed.toLocaleString():'⚠️', bg:'#f0fdf4', color:placed>0?'#111':'#dc2626'},
                {lbl:'Total Dead',   val:totalDead.toLocaleString(),             bg:'#fef2f2', color:'#dc2626'},
                {lbl:'Birds Left',   val:placed>0?(placed-totalDead).toLocaleString():'—', bg:'#f0fdf4', color:'#16a34a'},
                {lbl:'Mortality %',  val:totalMort,                              bg:'#fffbeb', color:'#d97706'},
                {lbl:'Livability',   val:finalLiv,                               bg:'#f0fdf4', color:'#16a34a'},
              ].map(s=>`<div style="flex:1;min-width:80px;border:1px solid #e5e5e5;border-radius:6px;padding:8px;text-align:center;background:${s.bg};">
                <div style="font-size:10px;color:#888;text-transform:uppercase;font-weight:700;">${s.lbl}</div>
                <div style="font-size:22px;font-weight:800;color:${s.color};margin-top:2px;">${s.val}</div>
              </div>`).join('')}
            </div>
            <div style="border-top:3px solid #22c55e;margin-bottom:8px;"></div>
            <div style="display:flex;gap:12px;margin-bottom:8px;font-size:12px;">
              <span style="color:#dc2626;font-weight:700;">🟥 High mortality</span>
              <span style="color:#f97316;font-weight:700;">🟧 Deaths recorded</span>
              <span style="color:#aaa;">⬜ No deaths</span>
            </div>
            <div style="overflow-x:auto;">
              <table style="width:100%;border-collapse:collapse;table-layout:auto;">
                <thead>
                  <tr style="background:#111;color:#fff;">
                    <th style="padding:8px 6px;text-align:left;font-size:26px;width:90px;max-width:90px;">Week</th>
                    ${DAYS.map(d=>`<th style="padding:8px 2px;text-align:center;font-size:26px;">${d}</th>`).join('')}
                    <th style="padding:8px 4px;text-align:center;font-size:26px;border-left:2px solid #333;">Dead</th>
                    <th style="padding:8px 4px;text-align:center;font-size:26px;border-left:2px solid #333;">Livab.</th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
                <tfoot>
                  <tr style="background:#f5f5f5;border-top:2px solid #111;font-weight:700;">
                    <td colspan="8" style="padding:6px 10px;font-size:26px;">TOTAL</td>
                    <td style="text-align:center;padding:6px;font-size:26px;font-weight:700;color:#dc2626;border-left:2px solid #ddd;">${totalDead||'—'}</td>
                    <td style="text-align:center;padding:6px;font-size:26px;font-weight:700;color:#16a34a;border-left:2px solid #ddd;">${finalLiv}</td>
                  </tr>
                </tfoot>
              </table>
            </div>
            <div style="margin-top:10px;font-size:10px;color:#bbb;text-align:center;">FlockPro · ${farmName} · Flock #${flockId} · ${now}</div>
          </div>`;
      });
    }

    // Initialize app

    (function() {

      if (!appEl || !window.visualViewport) return;
      function onViewportChange() {
        const scale = window.visualViewport.scale || 1;
        if (scale <= 1) {
          appEl.style.paddingTop = '';
          appEl.style.paddingBottom = '';
        } else {
          const extraPad = Math.round(window.visualViewport.height * (scale - 1) * 0.5);
          appEl.style.paddingTop = extraPad + 'px';
          appEl.style.paddingBottom = extraPad + 'px';
        }
      }
      window.visualViewport.addEventListener('resize', onViewportChange);
      window.visualViewport.addEventListener('scroll', onViewportChange);
    })();

🔐 REQUIRED FIRESTORE SECURITY RULES
═══════════════════════════════════════════════════════════════════

Copy these rules to your Firebase Console → Firestore → Rules:

rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    
    // Helper function to check if user account is active
    function isActive(userId) {
      return !exists(/databases/$(database)/documents/accountStatus/$(userId)) ||
             get(/databases/$(database)/documents/accountStatus/$(userId)).data.status != 'suspended';
    }
    
    // Helper function to check if email is approved (invite-only mode)
    function isApprovedEmail(email) {
      return exists(/databases/$(database)/documents/approvedEmails/$(email)) &&
             get(/databases/$(database)/documents/approvedEmails/$(email)).data.approved == true;
    }
    
    // User flock data - only owner can read/write if active
    match /users/{userId}/flocks/{flockId} {
      allow read, write: if request.auth != null && 
                           request.auth.uid == userId &&
                           isActive(userId);
    }
    
    // User settings - only owner can read/write if active
    match /users/{userId}/settings/{document=**} {
      allow read, write: if request.auth != null && 
                           request.auth.uid == userId &&
                           isActive(userId);
    }
    
    // Approved emails - users can read to check if they can register
    match /approvedEmails/{email} {
      allow read: if request.auth != null;
      allow write: if false; // Admin only via Firebase Console
    }
    
    // Account status - users can read their own status
    match /accountStatus/{userId} {
      allow read: if request.auth != null && 
                     request.auth.uid == userId;
      allow write: if false; // Admin only via Firebase Console
    }
    
    // Admin collection (if you add admin features)
    match /admin/{document=**} {
      allow read, write: if false; // Admin only via Firebase Console
    }
  }
}
