      async loadDailyLogs() {
        if (!this.currentFlock || !this.currentFlock.docId) return;
        this.dailyLogsLoading = true;
        try {
          const snapshot = await db.collection('users').doc(this.user.uid)
            .collection('flocks').doc(this.currentFlock.docId)
            .collection('dailyLogs').orderBy('date', 'desc').get();
          this.dailyLogs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        } catch (e) {
          this.showToast('Failed to load daily logs', 'error');
          this.dailyLogs = [];
        }
        this.dailyLogsLoading = false;
        this.render();
      }


      // ── Inventory ↔ Daily Log Link ─────────────────────────────────
      // Get inventory items for a specific category key (used in daily log dropdowns)
      getInvItemsForDailyLog(catKey) {
        console.log('[INV-LINK] getInvItemsForDailyLog called with:', catKey);
        console.log('[INV-LINK] inventoryCategories:', JSON.stringify((this.inventoryCategories||[]).map(c => ({name:c.name, expFieldKey:c.expFieldKey, docId:c.docId}))));
        console.log('[INV-LINK] inventoryItems count:', (this.inventoryItems||[]).length);
        if (!this.inventoryCategories || !this.inventoryItems) return [];
        // Match by expFieldKey first, then fall back to name matching
        const nameMap = { water: 'Water Additives', meds: 'Meds & Vaccines' };
        let cat = this.inventoryCategories.find(c => c.expFieldKey === catKey);
        if (!cat && nameMap[catKey]) {
          cat = this.inventoryCategories.find(c => (c.name || '').includes(nameMap[catKey]));
        }
        console.log('[INV-LINK] matched category:', cat ? cat.name + ' (' + cat.docId + ')' : 'NONE');
        if (!cat) return [];
        const items = this.inventoryItems
          .filter(i => i.categoryId === cat.docId && i.name && i.name !== 'New Item')
          .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
        console.log('[INV-LINK] returning items:', items.map(i => i.name));
        return items;
      }

      // Handle dropdown selection — auto-fill unit, cost, and show/hide "Other" text input
      onDailyLogProductSelect(type, selectEl) {
        const form = selectEl.closest('form');
        if (!form) return;
        const val = selectEl.value;
        const isWater = type === 'water';

        const nameInput = form.querySelector(isWater ? '[name="waterProductName"]' : '[name="medName"]');
        const unitSelect = form.querySelector(isWater ? '[name="waterProductUnit"]' : '[name="medUnit"]');
        const costInput = form.querySelector(isWater ? '[name="waterProductsCost"]' : '[name="medsCost"]');
        const invIdInput = form.querySelector(isWater ? '[name="waterProductInvId"]' : '[name="medProductInvId"]');
        const amtInput = form.querySelector(isWater ? '[name="waterProductAmt"]' : '[name="medAmt"]');

        if (val === '__other__') {
          // Show text input for custom name
          if (nameInput) { nameInput.style.display = ''; nameInput.value = ''; nameInput.focus(); }
          if (invIdInput) invIdInput.value = '';
          // Don't clear unit/cost — user fills manually
          return;
        }

        // Hide text input if they picked from inventory
        if (nameInput) nameInput.style.display = 'none';

        if (!val) {
          // Reset
          if (invIdInput) invIdInput.value = '';
          if (costInput) costInput.value = '';
          return;
        }

        // Auto-fill from the selected option's data attributes
        const opt = selectEl.options[selectEl.selectedIndex];
        const unit = opt.dataset.unit || '';
        const costPer = parseFloat(opt.dataset.costper) || 0;
        const qty = parseFloat(opt.dataset.qty) || 0;

        if (invIdInput) invIdInput.value = val;

        // Set unit dropdown to match inventory item's unit
        if (unitSelect) {
          const unitLower = unit.toLowerCase();
          for (let i = 0; i < unitSelect.options.length; i++) {
            if (unitSelect.options[i].value.toLowerCase() === unitLower) {
              unitSelect.selectedIndex = i;
              break;
            }
          }
        }

        // Auto-calc cost when amount changes
        if (amtInput && costPer > 0) {
          const calcCost = () => {
            const amt = parseFloat(amtInput.value) || 0;
            if (costInput && amt > 0) costInput.value = (amt * costPer).toFixed(2);
          };
          amtInput.removeEventListener('input', amtInput._autoCostHandler);
          amtInput._autoCostHandler = calcCost;
          amtInput.addEventListener('input', calcCost);
        }

        // Show stock warning if low
        if (qty <= 0) {
          this.showToast('⚠️ ' + (opt.dataset.name || 'Item') + ' is out of stock in inventory!', 'error');
        } else if (qty < 5) {
          this.showToast('⚠️ Low stock: only ' + qty.toFixed(1) + ' ' + unit + ' of ' + (opt.dataset.name || 'item') + ' left', 'error');
        }
      }

      // Deduct quantity from inventory after daily log save
      async deductFromInventory(invItemDocId, amountUsed) {
        if (!invItemDocId || !amountUsed || amountUsed <= 0 || !this.user) return;
        const item = (this.inventoryItems || []).find(i => i.docId === invItemDocId);
        if (!item) return;

        const oldQty = parseFloat(item.qty) || 0;
        const newQty = Math.max(0, oldQty - amountUsed);
        item.qty = newQty;

        try {
          await db.collection('users').doc(this.user.uid)
            .collection('invItems').doc(invItemDocId)
            .update({ qty: newQty });

          // Also update linked expense item if exists
          if (item.linkedExpItemId) {
            const expItem = (this.expenseItems || []).find(e => e.docId === item.linkedExpItemId);
            if (expItem) {
              expItem.qty = newQty;
              expItem.amount = newQty * (parseFloat(expItem.costPer) || 0);
              await db.collection('users').doc(this.user.uid)
                .collection('expItems').doc(item.linkedExpItemId)
                .update({ qty: newQty, amount: expItem.amount });
            }
          }

          if (newQty <= 0) {
            this.showToast('📦 ' + (item.name || 'Item') + ' is now out of stock!', 'error');
          } else if (newQty < 5) {
            this.showToast('📦 ' + (item.name || 'Item') + ': ' + newQty.toFixed(1) + ' ' + (item.unit||'') + ' remaining');
          }
        } catch(e) {
          console.error('deductFromInventory error:', e);
        }
      }

      // Merge same-name products in a pipe-separated string
      // e.g. "2 gals of bleach | 1 gals of bleach" → "3 gals of bleach"
      _mergeProductStr(existingStr, newStr) {
        if (!existingStr) return newStr || '';
        if (!newStr) return existingStr || '';
        // Parse entries like "2 gals of bleach" into { amt, unit, name }
        const parse = (s) => {
          const parts = s.split(' | ').map(p => p.trim()).filter(Boolean);
          const map = {};
          for (const p of parts) {
            const m = p.match(/^([\d.]+)\s+(\S+)\s+of\s+(.+)$/i);
            if (m) {
              const name = m[3].toLowerCase().trim();
              if (!map[name]) map[name] = { amt: 0, unit: m[2], displayName: m[3] };
              map[name].amt += parseFloat(m[1]) || 0;
            } else {
              // No amount pattern — just a bare name, keep as-is
              const name = p.toLowerCase().trim();
              if (!map[name]) map[name] = { amt: 0, unit: '', displayName: p };
            }
          }
          return map;
        };
        const merged = parse(existingStr);
        const incoming = parse(newStr);
        for (const [key, val] of Object.entries(incoming)) {
          if (merged[key]) {
            merged[key].amt += val.amt;
          } else {
            merged[key] = val;
          }
        }
        return Object.values(merged)
          .map(v => v.amt > 0 && v.unit ? `${Math.round(v.amt * 100) / 100} ${v.unit} of ${v.displayName}` : v.displayName)
          .join(' | ');
      }

      async handleDailyLogSave(event) {
        event.preventDefault();
        if (this.accountFrozen) {
          this.showToast('⚠️ Account Frozen: Cannot save', 'error');
          return false;
        }
        const form = event.target;
        const data = new FormData(form);
        // Get water product — from dropdown (inventory) or free text ("Other")
        const waterInvId = data.get('waterProductInvId') || '';
        const waterSelectVal = data.get('waterProductSelect') || '';
        let waterName;
        if (waterInvId && waterSelectVal && waterSelectVal !== '__other__') {
          // From inventory dropdown — use the data-name attribute
          const waterItem = (this.inventoryItems || []).find(i => i.docId === waterInvId);
          waterName = waterItem ? waterItem.name : '';
        } else {
          waterName = this.sanitizeInput((data.get('waterProductName') || '').trim());
        }
        const waterAmt  = parseFloat(data.get('waterProductAmt')) || 0;
        const waterUnit = data.get('waterProductUnit') || 'gals';
        const waterProductsStr = waterName
          ? (waterAmt > 0 ? `${waterAmt} ${waterUnit} of ${waterName}` : waterName)
          : '';

        // Get meds — from dropdown (inventory) or free text ("Other")
        const medInvId = data.get('medProductInvId') || '';
        const medSelectVal = data.get('medProductSelect') || '';
        let medName;
        if (medInvId && medSelectVal && medSelectVal !== '__other__') {
          const medItem = (this.inventoryItems || []).find(i => i.docId === medInvId);
          medName = medItem ? medItem.name : '';
        } else {
          medName = this.sanitizeInput((data.get('medName') || '').trim());
        }
        const medAmt  = parseFloat(data.get('medAmt')) || 0;
        const medUnit = data.get('medUnit') || 'mg';
        const medsUsedStr = medName
          ? (medAmt > 0 ? `${medAmt} ${medUnit} of ${medName}` : medName)
          : '';

        const entry = {
          date: data.get('date') || new Date().toISOString().split('T')[0],
          deaths: parseInt(data.get('deaths')) || 0,
          culls: parseInt(data.get('culls')) || 0,
          waterGallons: parseFloat(data.get('waterGallons')) || 0,
          waterProducts: waterProductsStr,
          waterProductsCost: parseFloat(data.get('waterProductsCost')) || 0,
          medsUsed: medsUsedStr,
          medsCost: parseFloat(data.get('medsCost')) || 0,
          savedAt: new Date().toISOString()
        };

        // Check if an entry already exists for this date
        const existing = this.dailyLogs.find(l => l.date === entry.date);

        try {
          if (existing) {
            // Same day — ADD ON to the existing entry
            const updated = {
              date: entry.date,
              deaths: (existing.deaths || 0) + entry.deaths,
              culls: (existing.culls || 0) + entry.culls,
              waterGallons: Math.round(((existing.waterGallons || 0) + entry.waterGallons) * 10) / 10,
              waterProducts: this._mergeProductStr(existing.waterProducts, entry.waterProducts),
              waterProductsCost: Math.round(((existing.waterProductsCost || 0) + entry.waterProductsCost) * 100) / 100,
              medsUsed: this._mergeProductStr(existing.medsUsed, entry.medsUsed),
              medsCost: Math.round(((existing.medsCost || 0) + entry.medsCost) * 100) / 100,
              savedAt: existing.savedAt,
              updatedAt: new Date().toISOString()
            };
            await db.collection('users').doc(this.user.uid)
              .collection('flocks').doc(this.currentFlock.docId)
              .collection('dailyLogs').doc(existing.id).update(updated);
            const idx = this.dailyLogs.findIndex(l => l.id === existing.id);
            this.dailyLogs[idx] = { id: existing.id, ...updated };
            this.showToast('✓ Added to today\'s entry (Deaths: ' + updated.deaths + ', Water: ' + updated.waterGallons + ' gal)');
          } else {
            // New date — create a fresh entry
            const ref = await db.collection('users').doc(this.user.uid)
              .collection('flocks').doc(this.currentFlock.docId)
              .collection('dailyLogs').add(entry);
            entry.id = ref.id;
            this.dailyLogs = [entry, ...this.dailyLogs];
            this.showToast('✓ Daily entry saved!');
          }

          // Update shipped count on the flock to reflect birds left
          const totalDead = this.dailyLogs.reduce((sum, l) => sum + (l.deaths || 0) + (l.culls || 0), 0);
          const birdsLeft = Math.max(0, (this.currentFlock.placed || 0) - totalDead);

          // Tally all costs from daily logs and add to flock expense fields
          const totalWaterCost = this.dailyLogs.reduce((sum, l) => sum + (l.waterProductsCost || 0), 0);
          const totalMedsCost = this.dailyLogs.reduce((sum, l) => sum + (l.medsCost || 0), 0);
          const newWater = Math.round(totalWaterCost * 100) / 100;
          const newMeds = Math.round(totalMedsCost * 100) / 100;

          await db.collection('users').doc(this.user.uid)
            .collection('flocks').doc(this.currentFlock.docId)
            .update({ shipped: birdsLeft, water: newWater, meds: newMeds });
          this.currentFlock.shipped = birdsLeft;
          this.currentFlock.water = newWater;
          this.currentFlock.meds = newMeds;

          // Auto-create/update Water and Meds sub-fields from daily log entries
          await this.syncProductSubFields();

          // ── Auto-deduct from inventory ──
          if (waterInvId && waterAmt > 0) {
            await this.deductFromInventory(waterInvId, waterAmt);
          }
          if (medInvId && medAmt > 0) {
            await this.deductFromInventory(medInvId, medAmt);
          }

          form.reset();
          form.querySelector('[name="date"]').value = new Date().toISOString().split('T')[0];
          // Reset dropdowns and hide "Other" text inputs
          const waterSelect = form.querySelector('[name="waterProductSelect"]');
          const medSelect = form.querySelector('[name="medProductSelect"]');
          if (waterSelect) waterSelect.selectedIndex = 0;
          if (medSelect) medSelect.selectedIndex = 0;
          const waterNameInput = form.querySelector('[name="waterProductName"]');
          const medNameInput = form.querySelector('[name="medName"]');
          if (waterNameInput) waterNameInput.style.display = 'none';
          if (medNameInput) medNameInput.style.display = 'none';
          this.render();
        } catch (e) {

      async deleteDailyLog(logId) {
        if (!logId || !this.currentFlock) return;
        try {
          await db.collection('users').doc(this.user.uid)
            .collection('flocks').doc(this.currentFlock.docId)
            .collection('dailyLogs').doc(logId).delete();
          this.dailyLogs = this.dailyLogs.filter(l => l.id !== logId);

          // Recalculate flock costs from remaining logs
          const totalDead = this.dailyLogs.reduce((sum, l) => sum + (l.deaths || 0) + (l.culls || 0), 0);
          const birdsLeft = Math.max(0, (this.currentFlock.placed || 0) - totalDead);
          const newWater = Math.round(this.dailyLogs.reduce((sum, l) => sum + (l.waterProductsCost || 0), 0) * 100) / 100;
          const newMeds = Math.round(this.dailyLogs.reduce((sum, l) => sum + (l.medsCost || 0), 0) * 100) / 100;
          await db.collection('users').doc(this.user.uid)
            .collection('flocks').doc(this.currentFlock.docId)
            .update({ shipped: birdsLeft, water: newWater, meds: newMeds });
          this.currentFlock.shipped = birdsLeft;
          this.currentFlock.water = newWater;
          this.currentFlock.meds = newMeds;

          await this.syncProductSubFields();

          this.showToast('Entry deleted');
          this.render();
        } catch (e) {
          this.showToast('Failed to delete: ' + e.message, 'error');
        }
      }

      // Parse a product name from text.
      // New format: "3 gals of Cid 2000" → "Cid 2000"
      // Legacy free text: "3 gals of Cid 2000" → same result
      parseProductName(text) {
        if (!text || !text.trim()) return null;
        // Strip leading quantity + units + "of/of the" patterns
        let cleaned = text.trim()
          .replace(/^\d+(\.\d+)?\s*(gals?|gallons?|oz\.?|ounces?|lbs?|pounds?|ml|cc|tsp|tbsp|quarts?|qt\.?|pints?|pt\.?|doses?|packets?|bags?|tabs?|tablets?|pills?|capsules?|caps?|mg)\s*(of\s+(the\s+)?)?/i, '')
          .replace(/^(of\s+(the\s+)?)/i, '')
          .trim();
        if (!cleaned || /^\d+$/.test(cleaned)) return text.trim();
        return cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
      }

      // Sync Water and Meds sub-fields from all daily log entries for the current flock
      async syncProductSubFields() {
        if (!this.settings) return;
        // Tally costs AND quantities per product across all daily logs
        const waterTotals = {}; // { productName: { cost, qty, unit } }
        const medsTotals  = {};

        // Helper to parse qty+unit from a log entry string like "4 gals of Cid 2000"
        const parseQtyUnit = (text) => {
          const m = text.trim().match(/^(\d+(\.\d+)?)\s*(gals?|gallons?|oz\.?|ounces?|lbs?|pounds?|ml|cc|tsp|tbsp|quarts?|qt\.?|pints?|pt\.?|doses?|packets?|bags?|tabs?|tablets?|pills?|capsules?|caps?|mg)\s*/i);
          if (m) return { qty: parseFloat(m[1]), unit: m[3].replace(/s$/i, '').toLowerCase() };
          return null;
        };

        for (const log of this.dailyLogs) {
          if (log.waterProducts && log.waterProducts.trim()) {
            const entries = log.waterProducts.split('|').map(s => s.trim()).filter(Boolean);
            const costs   = log.waterProductsCost || 0;
            const perCost = entries.length > 0 ? costs / entries.length : 0;
            entries.forEach(entry => {
              const name = this.parseProductName(entry);
              if (!name) return;
              if (!waterTotals[name]) waterTotals[name] = { cost: 0, qty: 0, unit: '' };
              waterTotals[name].cost = Math.round((waterTotals[name].cost + perCost) * 100) / 100;
              const qu = parseQtyUnit(entry);
              if (qu) { waterTotals[name].qty = Math.round((waterTotals[name].qty + qu.qty) * 100) / 100; waterTotals[name].unit = qu.unit; }
            });
          }
          if (log.medsUsed && log.medsUsed.trim()) {
            const entries = log.medsUsed.split('|').map(s => s.trim()).filter(Boolean);
            const costs   = log.medsCost || 0;
            const perCost = entries.length > 0 ? costs / entries.length : 0;
            entries.forEach(entry => {
              const name = this.parseProductName(entry);
              if (!name) return;
              if (!medsTotals[name]) medsTotals[name] = { cost: 0, qty: 0, unit: '' };
              medsTotals[name].cost = Math.round((medsTotals[name].cost + perCost) * 100) / 100;
              const qu = parseQtyUnit(entry);
              if (qu) { medsTotals[name].qty = Math.round((medsTotals[name].qty + qu.qty) * 100) / 100; medsTotals[name].unit = qu.unit; }
            });
          }
        }

        // Water/Meds totals are stored directly on flock top-level fields
      }

          deaths: parseInt(document.getElementById(`edit-deaths-${logId}`).value) || 0,
          culls: parseInt(document.getElementById(`edit-culls-${logId}`).value) || 0,

          medsUsed: this.sanitizeInput(document.getElementById(`edit-meds-${logId}`).value.slice(0, 300)),
          medsCost: parseFloat(document.getElementById(`edit-medsCost-${logId}`).value) || 0,
          savedAt: log.savedAt,
          updatedAt: new Date().toISOString()
        };
        try {
          await db.collection('users').doc(this.user.uid)
            .collection('flocks').doc(this.currentFlock.docId)
            .collection('dailyLogs').doc(logId).update(updated);
          const idx = this.dailyLogs.findIndex(l => l.id === logId);
          this.dailyLogs[idx] = { id: logId, ...updated };

          // Recalculate flock costs from all logs
          const totalDead = this.dailyLogs.reduce((sum, l) => sum + (l.deaths || 0) + (l.culls || 0), 0);
          const birdsLeft = Math.max(0, (this.currentFlock.placed || 0) - totalDead);
          const newWater = Math.round(this.dailyLogs.reduce((sum, l) => sum + (l.waterProductsCost || 0), 0) * 100) / 100;
          const newMeds = Math.round(this.dailyLogs.reduce((sum, l) => sum + (l.medsCost || 0), 0) * 100) / 100;
          await db.collection('users').doc(this.user.uid)
            .collection('flocks').doc(this.currentFlock.docId)
            .update({ shipped: birdsLeft, water: newWater, meds: newMeds });
          this.currentFlock.shipped = birdsLeft;
          this.currentFlock.water = newWater;

          this.showToast('✓ Entry updated!');
          this.render();
        } catch (e) {
          this.showToast('Failed to update: ' + e.message, 'error');
        }
      }

      async handleQuickEntrySave(event) {
        event.preventDefault();
        
        // Check if account is frozen
        if (this.accountFrozen) {
          this.showToast('⚠️ Account Frozen: You cannot save changes. Contact your administrator.', 'error');
          return;
        }
        
        const form = event.target;
        const formData = new FormData(form);

        const currentAlive = parseFloat(formData.get('currentAlive')) || this.quickEntryFlock.placed;
        const dailyFeed = parseFloat(formData.get('dailyFeed')) || 0;
        const currentWeight = parseFloat(formData.get('currentWeight')) || this.quickEntryFlock.weight;
        const todayFeedCost = parseFloat(formData.get('todayFeedCost')) || 0;
        const todayOtherCost = parseFloat(formData.get('todayOtherCost')) || 0;
        const quickNote = this.sanitizeInput((formData.get('quickNote') || '').slice(0, 500));
        const expenseNote = this.sanitizeInput((formData.get('expenseNote') || '').slice(0, 200));

        // Update flock data
        const updatedFlock = { ...this.quickEntryFlock };
        
        // Update mortality based on current alive count
        updatedFlock.mortality = updatedFlock.placed - currentAlive;
        
        // Add to cumulative feed
        updatedFlock.feedLbs = (updatedFlock.feedLbs || 0) + dailyFeed;
        
        // Update weight
        updatedFlock.weight = currentWeight;
        
        // Add to expenses
        updatedFlock.fCost = (updatedFlock.fCost || 0) + todayFeedCost;
        
        // If there's another expense, add it to the first available misc field
        if (todayOtherCost > 0) {
          if (this.settings.showMisc1) {
            updatedFlock.misc1 = (updatedFlock.misc1 || 0) + todayOtherCost;
          } else if (this.settings.showEquip) {
            updatedFlock.equip = (updatedFlock.equip || 0) + todayOtherCost;
          }
        }
        
        // Append quick note with timestamp
        if (quickNote) {
          const today = new Date().toLocaleDateString();
          const noteEntry = `\n[${today}] ${quickNote}${expenseNote ? ` (Expense: ${expenseNote})` : ''}`;
          updatedFlock.notes = (updatedFlock.notes || '') + noteEntry;
        }

        // Save to database
        try {
          await this.saveFlock(updatedFlock);
          this.quickEntryFlock = updatedFlock;
          this.showToast('✓ Quick entry saved!');
          
          // Refresh the form
          this.render();
        } catch (error) {
          this.showToast('Failed to save: ' + error.message, 'error');
        }
      }

      renderCompare() {
        const availableFlocks = this.flocks.filter(f => f.shipped > 0);

        if (availableFlocks.length === 0) {
          return `
            <div class="container">
              <div class="modern-card">
                <h3>Compare Flocks</h3>
                <p style="color: #888;">No completed flocks available for comparison. Flocks must be shipped to compare performance metrics.</p>
              </div>
            </div>
          `;
        }

        if (!this.compareMode) this.compareMode = 'flocks';
        const mode = this.compareMode;
        const isLight = document.body.classList.contains('light-mode');
        const tabStyle = (active) => `padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; font-weight: ${active ? '700' : '400'}; background: ${active ? '#1db954' : (isLight ? '#e5e7eb' : '#2a2a2a')}; color: ${active ? '#fff' : (isLight ? '#374151' : '#aaa')};`;

        const tabs = `
          <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;">
            <button style="${tabStyle(mode==='flocks')}" onclick="app.compareMode='flocks'; app.render()">🐔 Flocks</button>
            <button style="${tabStyle(mode==='barn')}" onclick="app.compareMode='barn'; app.render()">🏠 Barn</button>
            <button style="${tabStyle(mode==='hatchery')}" onclick="app.compareMode='hatchery'; app.render()">🥚 Hatchery</button>
            <button style="${tabStyle(mode==='breed')}" onclick="app.compareMode='breed'; app.render()">🐣 Breed</button>
          </div>
        `;

        // ── GROUP COMPARE MODES ──────────────────────────────────────────
        if (mode !== 'flocks') {
          const fieldMap = { barn: 'barn', hatchery: 'hatchery', breed: 'poultSupplier' };
          const field = fieldMap[mode];
          const labelMap = { barn: 'Barn', hatchery: 'Hatchery', breed: 'Breed' };

          // Group flocks by field value
          const groups = {};
          availableFlocks.forEach(f => {
            const key = (f[field] || '').trim() || '(Not Set)';
            if (!groups[key]) groups[key] = [];
            groups[key].push(f);
          });

          const groupKeys = Object.keys(groups);
          if (groupKeys.length < 2) {
            return `
              <div class="container">
                <div class="modern-card">
                  <h3>Compare by ${labelMap[mode]}</h3>
                  ${tabs}
                  <p style="color: #888; text-align: center; padding: 30px 0;">
                    Need at least 2 different ${labelMap[mode].toLowerCase()} values across your flocks to compare.
                  </p>
                </div>
              </div>
            `;
          }

          // Calculate averaged metrics per group
          const groupMetrics = groupKeys.map(key => {
            const gFlocks = groups[key];
            const count = gFlocks.length;
            const totals = gFlocks.reduce((acc, f) => {
              const m = this.calculateMetrics(f);
              acc.profit += m.profit || 0;
              acc.profitPerBird += m.profitPerBird || 0;
              acc.profitPerSqFt += m.profitPerSqFt || 0;
              acc.revenue += f.revenue || 0;
              acc.totalExp += m.totalExp || 0;
              acc.livability += m.livability || 0;
              acc.adg += m.adg || 0;
              acc.fcr += (m.fcr > 0 ? m.fcr : 0);
              acc.weight += f.weight || 0;
              acc.placed += f.placed || 0;
              acc.shipped += f.shipped || 0;
              return acc;
            }, { profit:0, profitPerBird:0, profitPerSqFt:0, revenue:0, totalExp:0, livability:0, adg:0, fcr:0, weight:0, placed:0, shipped:0 });

            const fcrFlocks = gFlocks.filter(f => this.calculateMetrics(f).fcr > 0).length || 1;
            return {
              key,
              count,
              flockNums: gFlocks.map(f => '#' + f.id).join(', '),
              profit: totals.profit / count,
              profitPerBird: totals.profitPerBird / count,
              profitPerSqFt: totals.profitPerSqFt / count,
              revenue: totals.revenue / count,
              totalExp: totals.totalExp / count,
              livability: totals.livability / count,
              adg: totals.adg / count,
              fcr: totals.fcr / fcrFlocks,
              weight: totals.weight / count,
              placed: totals.placed / count,
              shipped: totals.shipped / count,
              totalProfit: totals.profit,
            };
          });

          const best = (arr, fn, dir='high') => {
            const vals = arr.map(fn);
            const b = dir === 'high' ? Math.max(...vals) : Math.min(...vals.filter(v=>v>0));
            return arr.findIndex((g,i) => fn(g) === b);
          };

          const renderGroupRow = (label, fn, dir='high', fmt='') => {
            const vals = groupMetrics.map(fn);
            const bestVal = dir === 'high' ? Math.max(...vals) : Math.min(...vals.filter(v=>v>0));
            const bestIdx = vals.findIndex(v => v === bestVal);
            return `
              <tr style="border-bottom: 1px solid ${isLight?'#e5e7eb':'#333'};">
                <td style="padding: 8px 6px; color: ${isLight?'#374151':'#ddd'}; font-size: 0.9em;">${label}</td>
                ${groupMetrics.map((g, i) => {
                  const val = fn(g);
                  const display = fmt === '$' ? '$' + this.fmt(val)
                    : fmt === '%' ? val.toFixed(2) + '%'
                    : fmt === 'dec3' ? val.toFixed(3)
                    : fmt === 'dec2' ? val.toFixed(2)
                    : this.fmt(Math.round(val));
                  const isBest = i === bestIdx;
                  return `<td style="padding: 8px 6px; text-align: right; font-weight: ${isBest?'bold':'normal'}; color: ${isBest?'#22c55e':(isLight?'#1f2937':'#fff')}; font-size: 0.9em;">${display}${isBest?' 🏆':''}</td>`;
                }).join('')}
              </tr>`;
          };

          return `
            <div class="container">
              <div class="modern-card">
                <h3>Compare by ${labelMap[mode]}</h3>
                ${tabs}
                <p style="color: #888; margin-bottom: 16px; font-size: 0.88em;">Averages across all flocks in each group. Flocks per group shown below.</p>
                <div style="overflow-x: auto;">
                  <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                      <tr style="border-bottom: 2px solid ${isLight?'#d1d5db':'#444'};">
                        <th style="text-align: left; padding: 8px 6px; color: #22c55e; font-size: 0.9em;">Metric</th>
                        ${groupMetrics.map(g => `
                          <th style="text-align: right; padding: 8px 6px; font-size: 0.9em;">
                            <div style="font-weight: 600; color: ${isLight?'#1f2937':'#fff'};">${this.escapeHtml(g.key)}</div>
                            <div style="font-size: 0.78em; color: #888; font-weight: 400;">${g.count} flock${g.count>1?'s':''} · ${g.flockNums}</div>
                          </th>
                        `).join('')}
                      </tr>
                    </thead>
                    <tbody>
                      ${renderGroupRow('🐣 Avg Birds Placed', g => g.placed, 'high', '')}
                      ${renderGroupRow('🚚 Avg Birds Shipped', g => g.shipped, 'high', '')}
                      ${renderGroupRow('💚 Avg Livability', g => g.livability, 'high', '%')}
                      ${renderGroupRow('📏 Avg Weight (lbs)', g => g.weight, 'high', 'dec2')}
                      ${renderGroupRow('📈 Avg ADG', g => g.adg, 'high', 'dec3')}
                      ${renderGroupRow('🌾 Avg FCR', g => g.fcr, 'low', 'dec2')}
                      ${renderGroupRow('💰 Avg Revenue', g => g.revenue, 'high', '$')}
                      ${renderGroupRow('💸 Avg Expenses', g => g.totalExp, 'low', '$')}
                      ${renderGroupRow('💵 Avg Profit/Flock', g => g.profit, 'high', '$')}
                      ${renderGroupRow('🐦 Avg Profit/Bird', g => g.profitPerBird, 'high', '$')}
                      ${renderGroupRow('📊 Total Profit All', g => g.totalProfit, 'high', '$')}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          `;
        }

        // ── INDIVIDUAL FLOCK COMPARE ─────────────────────────────────────
        const compareFlocks = this.compareFlockIds
          .map(id => this.flocks.find(f => f.docId === id))
          .filter(f => f);

        return `
          <div class="container">
            <div class="modern-card">
              <h3>Compare Flocks</h3>
              ${tabs}
              <p style="color: #888; margin-bottom: 20px;">Select 2-3 flocks to compare their performance side-by-side</p>

              <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px;">
                ${availableFlocks.map(flock => {
                  const isSelected = this.compareFlockIds.includes(flock.docId);
                  const canSelect = !isSelected && this.compareFlockIds.length < 3;
                  return `
                    <button
                      class="btn ${isSelected ? 'btn-primary' : 'btn-secondary'}"
                      onclick="app.toggleCompareSelection('${flock.docId}')"
                      ${!isSelected && !canSelect ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}
                    >
                      ${isSelected ? '✓ ' : ''}Flock #${this.escapeHtml(String(flock.id))}${flock.barn ? ` - ${this.escapeHtml(flock.barn)}` : ''}
                    </button>
                  `;
                }).join('')}
              </div>

              ${compareFlocks.length === 0 ? `
                <p style="color: #666; text-align: center; padding: 40px 20px;">
                  👆 Select flocks above to start comparison
                </p>
              ` : ''}
            </div>

            ${compareFlocks.length >= 2 ? `
              <div class="modern-card">
                <h3>Performance Comparison</h3>
                <div style="overflow-x: auto;">
                  <table style="width: 100%; border-collapse: collapse; margin-top: 16px;">
                    <thead>
                      <tr style="border-bottom: 2px solid ${isLight ? '#d1d5db' : '#444'};">
                        <th style="text-align: left; padding: 8px 6px; color: #22c55e; font-size: 0.9em;">Metric</th>
                        ${compareFlocks.map(flock => `
                          <th style="text-align: right; padding: 8px 6px; font-size: 0.9em;">
                            <div style="font-weight: 600; color: ${isLight ? '#1f2937' : '#fff'};">Flock #${this.escapeHtml(String(flock.id))}</div>
                            ${flock.barn ? `<div style="font-size: 0.8em; color: ${isLight ? '#6b7280' : '#888'}; font-weight: 400;">${this.escapeHtml(flock.barn)}</div>` : ''}
                            ${flock.hatchery ? `<div style="font-size: 0.75em; color: #666;">${this.escapeHtml(flock.hatchery)}</div>` : ''}
                            ${flock.poultSupplier ? `<div style="font-size: 0.75em; color: #666;">${this.escapeHtml(flock.poultSupplier)}</div>` : ''}
                          </th>
                        `).join('')}
                      </tr>
                    </thead>
                    <tbody>
                      ${this.renderComparisonRow('📅 Date Started', compareFlocks, f => f.startedDate || 'N/A')}
                      ${this.renderComparisonRow('📅 Date Shipped', compareFlocks, f => f.shippedDate || 'N/A')}
                      ${this.renderComparisonRow('🏠 Barn', compareFlocks, f => f.barn || '—')}
                      ${this.renderComparisonRow('🥚 Hatchery', compareFlocks, f => f.hatchery || '—')}
                      ${this.renderComparisonRow('🐣 Breed', compareFlocks, f => f.poultSupplier || '—')}
                      ${this.renderComparisonRow('🐣 Birds Placed', compareFlocks, f => this.fmt(f.placed))}
                      ${this.renderComparisonRow('🚚 Birds Shipped', compareFlocks, f => this.fmt(f.shipped))}
                      ${this.renderComparisonRow('💚 Livability', compareFlocks, f => {
                        const metrics = this.calculateMetrics(f);
                        return metrics.livability.toFixed(2) + '%';
                      }, true, 'high')}
                      ${this.renderComparisonRow('📏 Avg Weight (lbs)', compareFlocks, f => f.weight.toFixed(2), true, 'high')}
                      ${this.renderComparisonRow('📈 ADG', compareFlocks, f => {
                        const metrics = this.calculateMetrics(f);
                        return metrics.adg.toFixed(3);
                      }, true, 'high')}
                      ${this.renderComparisonRow('🌾 FCR', compareFlocks, f => {
                        const metrics = this.calculateMetrics(f);
                        return metrics.fcr.toFixed(2);
                      }, true, 'low')}
                      ${this.renderComparisonRow('💰 Revenue', compareFlocks, f => '$' + this.fmt(f.revenue), true, 'high')}
                      ${this.renderComparisonRow('💸 Total Expenses', compareFlocks, f => {
                        const metrics = this.calculateMetrics(f);
                        return '$' + this.fmt(metrics.totalExp);
                      }, false)}
                      ${this.renderComparisonRow('💵 Total Profit', compareFlocks, f => {
                        const metrics = this.calculateMetrics(f);
                        return '$' + this.fmt(metrics.profit);
                      }, true, 'high')}
                      ${this.renderComparisonRow('🐦 Profit/Bird', compareFlocks, f => {
                        const metrics = this.calculateMetrics(f);
                        return '$' + this.fmt(metrics.profitPerBird);
                      }, true, 'high')}
                      ${this.renderComparisonRow('📐 Profit/Sq Ft', compareFlocks, f => {
                        const metrics = this.calculateMetrics(f);
                        return '$' + this.fmt(metrics.profitPerSqFt);
                      }, true, 'high')}
                    </tbody>
                  </table>
                </div>
              </div>

              <div class="modern-card">
                <h3>Winner Analysis</h3>
                ${this.renderWinnerSummary(compareFlocks)}
              </div>
            ` : ''}
          </div>
        `;
      }

      renderComparisonRow(label, flocks, getValue, highlight = false, bestIs = 'high') {
        const values = flocks.map(f => ({
          flock: f,
          displayValue: getValue(f),
          numericValue: parseFloat(getValue(f).replace(/[$,%]/g, ''))
        }));

        let bestIndex = -1;
        if (highlight) {
          const numericValues = values.map(v => v.numericValue).filter(v => !isNaN(v));
          if (numericValues.length > 0) {
            const bestValue = bestIs === 'high' ? Math.max(...numericValues) : Math.min(...numericValues);
            bestIndex = values.findIndex(v => v.numericValue === bestValue);
          }
        }

        const isLightMode = document.body.classList.contains('light-mode');
        const borderColor = isLightMode ? '#e5e5e5' : '#333';
        const labelColor = isLightMode ? '#374151' : '#ddd';
        const valueColor = isLightMode ? '#1f2937' : '#fff';

        return `
          <tr style="border-bottom: 1px solid ${borderColor};">
            <td style="padding: 8px 6px; color: ${labelColor}; font-size: 0.9em;">${label}</td>
            ${values.map((v, idx) => `
              <td style="padding: 8px 6px; text-align: right; font-weight: ${idx === bestIndex ? 'bold' : 'normal'}; color: ${idx === bestIndex ? '#22c55e' : valueColor}; font-size: 0.9em;">
                ${v.displayValue}
                ${idx === bestIndex && highlight ? ' 🏆' : ''}
              </td>
            `).join('')}
          </tr>
        `;
      }

      renderWinnerSummary(flocks) {
        const metrics = flocks.map(f => ({
          flock: f,
          metrics: this.calculateMetrics(f)
        }));

        // Find winners in each category
        const bestProfit = metrics.reduce((best, current) => 
          current.metrics.profit > best.metrics.profit ? current : best
        );
        
        const bestFCR = metrics.reduce((best, current) => 
          current.metrics.fcr < best.metrics.fcr && current.metrics.fcr > 0 ? current : best
        );
        
        const bestLivability = metrics.reduce((best, current) => 
          current.metrics.livability > best.metrics.livability ? current : best
        );

        return `
          <div style="display: grid; gap: 16px;">
            <div style="padding: 16px; background: rgba(34, 197, 94, 0.1); border: 1px solid #22c55e; border-radius: 8px;">
              <div style="color: #22c55e; font-weight: 600; margin-bottom: 8px;">🏆 Best Overall Profit</div>
              <div style="font-size: 1.2em; font-weight: bold;">Flock #${this.escapeHtml(String(bestProfit.flock.id))}</div>
              <div style="color: #888; margin-top: 4px;">$${this.fmt(bestProfit.metrics.profit)} total profit</div>
            </div>

            <div style="padding: 16px; background: rgba(34, 197, 94, 0.1); border: 1px solid #22c55e; border-radius: 8px;">
              <div style="color: #22c55e; font-weight: 600; margin-bottom: 8px;">🌾 Best Feed Conversion</div>
              <div style="font-size: 1.2em; font-weight: bold;">Flock #${this.escapeHtml(String(bestFCR.flock.id))}</div>
              <div style="color: #888; margin-top: 4px;">FCR: ${bestFCR.metrics.fcr.toFixed(2)}</div>
            </div>

            <div style="padding: 16px; background: rgba(34, 197, 94, 0.1); border: 1px solid #22c55e; border-radius: 8px;">
              <div style="color: #22c55e; font-weight: 600; margin-bottom: 8px;">💚 Best Livability</div>
              <div style="font-size: 1.2em; font-weight: bold;">Flock #${this.escapeHtml(String(bestLivability.flock.id))}</div>
              <div style="color: #888; margin-top: 4px;">${bestLivability.metrics.livability.toFixed(2)}% survival rate</div>
            </div>
          </div>
        `;
      }

      toggleCompareSelection(docId) {
        const index = this.compareFlockIds.indexOf(docId);
        if (index > -1) {
          this.compareFlockIds.splice(index, 1);
        } else if (this.compareFlockIds.length < 3) {
          this.compareFlockIds.push(docId);
        }
        this.render();
      }

      renderSummary() {
        const selectedFlocks = this.flocks.filter(f => this.selectedFlockIds.includes(f.docId));
        
        let summary = null;
        if (selectedFlocks.length > 0) {
          summary = this.calculateSummary(selectedFlocks);
        }

        return `
          <div class="container">
            <div class="modern-card flock-selection-card">
              <h2>Select Flocks to Include</h2>
              <div style="display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;">
                <button onclick="app.selectAllFlocks()" class="btn btn-primary">Select All</button>
                <button onclick="app.selectNoFlocks()" class="btn btn-secondary">Clear All</button>
                <button onclick="app.exportToCSV()" class="btn btn-secondary" ${this.selectedFlockIds.length === 0 ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>📊 Export to CSV</button>
                <button onclick="app.exportToPDF()" class="btn btn-secondary" ${this.selectedFlockIds.length === 0 ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>📄 Export to PDF</button>
              </div>
              <div class="checkbox-list">
                ${this.flocks.map(flock => `
                  <div class="checkbox-item">
                    <input type="checkbox" id="flock-${flock.docId}" 
                      ${this.selectedFlockIds.includes(flock.docId) ? 'checked' : ''}
                      onchange="app.toggleFlockSelection('${flock.docId}')">
                    <label for="flock-${flock.docId}">
                      Flock #${this.escapeHtml(String(flock.id))}${flock.barn ? ' - ' + this.escapeHtml(flock.barn) : ''}${flock.shippedDate ? ' (' + this.formatDate(flock.shippedDate) + ')' : ''}
                    </label>
                  </div>
                `).join('')}
              </div>
              
              <!-- Generate Report Button -->
              <div style="text-align: center; margin-top: 24px; padding-top: 24px; border-top: 2px solid rgba(255,255,255,0.1);">
                <button onclick="app.generateReport()" class="btn btn-primary" id="generateReportBtn" 
                  ${this.selectedFlockIds.length === 0 ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}
                  style="padding: 16px 48px; font-size: 1.1em; font-weight: 700;">
                  📊 Generate Report
                </button>
              </div>
            </div>

            ${this.selectedFlockIds.length > 0 ? `
              <div style="text-align: center; margin: 24px 0;">
                <button onclick="app.openReportView('summary')" class="btn btn-primary" style="padding: 16px 32px; font-size: 1.1em; background:#22c55e; color:#000; font-weight:700;">🖨️ Print Preview</button>
              </div>
            ` : ''}
            ${summary ? `
              ${summary.flockCount > 0 ? `` : ''}

              <div class="modern-card">
                <h2>Summary Report</h2>
                
                <!-- V2.0: Performance Highlights -->
                ${(() => {
                  const stats = this.getPerformanceStats();
                  return stats ? `
                    <div style="background: rgba(34, 197, 94, 0.05); border: 1px solid rgba(34, 197, 94, 0.2); border-radius: 12px; padding: 20px; margin-bottom: 24px;">
                      <h3 style="margin-bottom: 16px;">🏆 Performance Highlights</h3>
                      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                        <div>
                          <div style="color: #888; font-size: 0.9em;">Best Performer</div>
                          <div style="color: #22c55e; font-size: 1.3em; font-weight: 700;">Flock #${stats.best.id}</div>
                          <div style="color: #aaa; font-size: 0.9em;">$${stats.best.profit.toFixed(2)} profit</div>
                        </div>
                        <div>
                          <div style="color: #888; font-size: 0.9em;">Weakest Performer</div>
                          <div style="color: #ef4444; font-size: 1.3em; font-weight: 700;">Flock #${stats.worst.id}</div>
                          <div style="color: #aaa; font-size: 0.9em;">$${stats.worst.profit.toFixed(2)} profit</div>
                        </div>
                        <div>
                          <div style="color: #888; font-size: 0.9em;">Average Profit</div>
                          <div style="color: #f59e0b; font-size: 1.3em; font-weight: 700;">$${stats.average.toFixed(2)}</div>
                          <div style="color: #aaa; font-size: 0.9em;">across all flocks</div>
                        </div>
                      </div>
                    </div>
                  ` : '';
                })()}
                
                <!-- V2.0: Profit Trend Chart -->
                ${this.flocks.filter(f => f.shipped > 0).length > 1 ? `
                  <div style="margin-bottom: 32px;">
                    <h3>📈 Profit Trend Over Time</h3>
                    <div class="chart-container">
                      <canvas id="profitTrendChart"></canvas>
                    </div>
                  </div>
                ` : ''}
                
                <div class="stat-grid">
                  <div class="stat-card">
                    <div class="stat-label">Total Placed</div>
                    <div class="stat-value">${summary.placed.toLocaleString()}</div>
                  </div>
                  <div class="stat-card">
                    <div class="stat-label">Total Shipped</div>
                    <div class="stat-value">${summary.shipped.toLocaleString()}</div>
                  </div>
                  <div class="stat-card">
                    <div class="stat-label">Total Revenue</div>
                    <div class="stat-value positive">${this.fmt(summary.revenue)}</div>
                  </div>
                  <div class="stat-card">
                    <div class="stat-label">Total Expenses</div>
                    <div class="stat-value negative">${this.fmt(summary.expenses)}</div>
                  </div>
                  <div class="stat-card">
                    <div class="stat-label">Total Profit</div>
                    <div class="stat-value ${summary.profit >= 0 ? 'positive' : 'negative'}">
                      ${this.fmt(summary.profit)}
                    </div>
                  </div>
                  <div class="stat-card">
                    <div class="stat-label">Active Flocks</div>
                    <div class="stat-value">${summary.flockCount}</div>
                  </div>
                </div>

                <h3 style="margin-top: 30px;">Group Performance</h3>
                <div class="metric-grid">
                  <div class="metric-item">
                    <div class="metric-label">ADG</div>
                    <div class="metric-value">${(Math.floor(summary.adg * 10000) / 10000).toFixed(4)}</div>
                  </div>
                  <div class="metric-item">
                    <div class="metric-label">Age</div>

      renderExpenseBreakdown(summary) {
        const expDefs = [
          { show: 'showFeed', label: 'feedLabel', key: 'Feed', total: 'totalFeedCost' },
          { show: 'showPoult', label: 'poultLabel', key: 'Poult', total: 'totalPoultCost' },
          { show: 'showMeds', label: 'medsLabel', key: 'Meds', total: 'totalMeds' },
          { show: 'showClean', label: 'cleanLabel', key: 'Clean', total: 'totalClean' },
          { show: 'showPest', label: 'pestLabel', key: 'Pest', total: 'totalPest' },
          { show: 'showWater', label: 'waterLabel', key: 'Water', total: 'totalWater' },
          { show: 'showEquip', label: 'equipLabel', key: 'Equip', total: 'totalEquip' },
          { show: 'showRepairs', label: 'repairsLabel', key: 'Repairs', total: 'totalRepairs' },
          { show: 'showElectric', label: 'electricLabel', key: 'Electric', total: 'totalElectric' },
          { show: 'showGas', label: 'gasLabel', key: 'Gas', total: 'totalGas' },
          { show: 'showCoal', label: 'coalLabel', key: 'Coal', total: 'totalCoal' },
          { show: 'showLoading', label: 'loadingLabel', key: 'Loading', total: 'totalLoading' },
          { show: 'showShavings', label: 'shavingsLabel', key: 'Shavings', total: 'totalShavings' },
          { show: 'showLabor', label: 'laborLabel', key: 'Labor', total: 'totalLabor' },
          { show: 'showDep', label: 'depLabel', key: 'Dep', total: 'totalDep' },
          { show: 'showFuel', label: 'fuelLabel', key: 'Fuel', total: 'totalFuel' },
          { show: 'showMisc1', label: 'misc1Label', key: 'Misc1', total: 'totalMisc1' },
          { show: 'showMisc2', label: 'misc2Label', key: 'Misc2', total: 'totalMisc2' },
          { show: 'showMisc3', label: 'misc3Label', key: 'Misc3', total: 'totalMisc3' },
          { show: 'showMisc4', label: 'misc4Label', key: 'Misc4', total: 'totalMisc4' },
        ];
        const expenses = [];
        expDefs.forEach(def => {
          const val = summary[def.total] || 0;
          if (!this.settings[def.show] || val === 0) return;
          // Show parent total only — sub-items stay inside the arrow box on the flock form
          expenses.push({ label: this.settings[def.label], value: val });
        });

        return expenses.map((exp, idx) => `
          <div class="expense-row" ${idx === expenses.length - 1 ? 'style="border-bottom: none;"' : ''} ${exp.isSub ? 'style="padding-left: 20px; opacity: 0.8;"' : ''}>
            <span class="expense-label" style="${exp.isSub ? 'font-size: 0.9em; color: #aaa;' : ''}">${this.escapeHtml(exp.label)}:</span>
            <strong style="${exp.isSub ? 'font-size: 0.9em; color: #aaa;' : ''}">${this.fmt(exp.value)}</strong>
          </div>
        `).join('');
      }

      calculateSummary(flocks) {
        const summary = {
          flockCount: flocks.length,
          placed: 0, shipped: 0, revenue: 0, expenses: 0, profit: 0,
          totalFeedLbs: 0, totalWeight: 0, totalAgeDays: 0, totalSqFt: 0,
          totalFeedCost: 0, totalPoultCost: 0, totalMeds: 0, totalClean: 0,
          totalPest: 0, totalWater: 0, totalEquip: 0, totalRepairs: 0,
          totalElectric: 0, totalGas: 0, totalCoal: 0, totalLoading: 0,
          totalShavings: 0, totalLabor: 0, totalDep: 0, totalFuel: 0,
          totalMisc1: 0, totalMisc2: 0, totalMisc3: 0, totalMisc4: 0,
          expSubTotals: {},
          adg: 0, fcr: 0, livability: 0, avgAge: 0, avgWeight: 0,
          avgPricePerLb: 0, profitPerBird: 0, profitPerSqFt: 0, sqFtPerBird: 0
        };

        let totalPricePerLb = 0;
        let flocksWithPrice = 0;

        flocks.forEach(flock => {
          const metrics = this.calculateMetrics(flock);
          summary.placed += flock.placed || 0;
          summary.shipped += flock.shipped || 0;
          summary.revenue += flock.revenue || 0;
          summary.expenses += metrics.totalExp;
          summary.totalFeedLbs += flock.feedLbs || 0;
          summary.totalSqFt += flock.barnSqFt || 0;
          
          summary.totalFeedCost += flock.fCost || 0;
          summary.totalPoultCost += flock.pCost || 0;
          summary.totalMeds += flock.meds || 0;
          summary.totalClean += flock.clean || 0;
          summary.totalPest += flock.pest || 0;
          summary.totalWater += flock.water || 0;
          summary.totalEquip += flock.equip || 0;
          summary.totalRepairs += flock.repairs || 0;
          summary.totalElectric += flock.electric || 0;
          summary.totalGas += flock.gas || 0;
          summary.totalCoal += flock.coal || 0;
          summary.totalLoading += flock.loading || 0;
          summary.totalShavings += flock.shavings || 0;
          summary.totalLabor += flock.labor || 0;
          summary.totalDep += flock.depreciation || 0;
          summary.totalFuel += flock.fuel || 0;
          
          if (flock.pricePerLb > 0) {
            totalPricePerLb += flock.pricePerLb;
            flocksWithPrice++;
          }
          
          if (metrics.ageDays > 0) {
            summary.totalAgeDays += metrics.ageDays;
            summary.totalWeight += flock.weight || 0;
          }
        });

        summary.profit = summary.revenue - summary.expenses;
        summary.livability = summary.placed > 0 ? (summary.shipped / summary.placed * 100) : 0;
        summary.avgAge = flocks.length > 0 ? summary.totalAgeDays / flocks.length : 0;
        summary.avgWeight = flocks.length > 0 ? summary.totalWeight / flocks.length : 0;
        summary.adg = summary.avgAge > 0 ? summary.avgWeight / summary.avgAge : 0;
        
        const totalLbs = summary.shipped * summary.avgWeight;
        summary.fcr = totalLbs > 0 ? summary.totalFeedLbs / totalLbs : 0;
        summary.avgPricePerLb = flocksWithPrice > 0 ? totalPricePerLb / flocksWithPrice : 0;
        summary.profitPerBird = summary.shipped > 0 ? summary.profit / summary.shipped : 0;
        summary.profitPerSqFt = summary.totalSqFt > 0 ? summary.profit / summary.totalSqFt : 0;
        summary.sqFtPerBird = summary.shipped > 0 ? summary.totalSqFt / summary.shipped : 0;

        return summary;
      }
